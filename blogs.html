ks/18071siihbhhu.js\"],\"default\"]\n6:\"$Sreact.suspense\"\n7:I[84439,[\"/_next/static/chunks/1xh5_hh-4xv03.js\",\"/_next/static/chunks/18071siihbhhu.js\",\"/_next/static/chunks/2h_2mq1uhpalj.js\",\"/_next/static/chunks/0r38jwpvhbrmp.js\"],\"default\"]\n1e:I[60199,[\"/_next/static/chunks/1xh5_hh-4xv03.js\",\"/_next/static/chunks/18071siihbhhu.js\"],\"default\",1]\n:HL[\"/_next/static/chunks/233p45nuh4m5b.css\",\"style\"]\n:HL[\"/_next/static/chunks/3mi_koyhkiqud.css\",\"style\"]\n:HL[\"/_next/static/chunks/17und6-ksznhx.css\",\"style\"]\n:HL[\"/_next/static/media/797e433ab948586e-s.p.0r6juujl39pe6.woff2\",\"font\",{\"crossOrigin\":\"\",\"type\":\"font/woff2\"}]\n:HL[\"/_next/static/media/caa3a2e1cccd8315-s.p.0wgildi0cnwt9.woff2\",\"font\",{\"crossOrigin\":\"\",\"type\":\"font/woff2\"}]\n:HL[\"/_next/static/media/feb57b2dc8f29018-s.p.3qy4m29-cg3o4.woff2\",\"font\",{\"crossOrigin\":\"\",\"type\":\"font/woff2\"}]\n8:T22e9,"])</script><script>self.__next_f.push([1,"\n### cmake-learn-by-doing\n\n##### source-link: [CMake 入门实战 | HaHack](https://www.hahack.com/codes/cmake)\n\n\n\n#### introduction\n\ncmake is a system independent automatic construct tool.\n\nuse cmake generating Makefile in linux:\n\n1. write `CMakeLists.txt`\n2. `cmake PATH` or `ccmake PATH`, the differences is that ccmake provide an interactive UI.\n3. use `make PATH` to compile.\n\n\n\n#### single-source-file\n\n```cmake\ncmake_minimum_required (VERSION 3.10)\n\nproject(hello VERSION 1.0)\n\nadd_executable(hello main.cpp)\n```\n\nthan:\n\n```bash\nmake\n\n./hello\n```\n\n\n\n#### mutiple-source-files\n\nfile tree:\n\n```\n./t1\n\t|\n\t+--- main.cpp\n\t|\n\t+--- math.cpp\n\t|\n\t+--- math.h\n```\n\nthen change `CMakeLists.txt`:\n\n```cmake\ncmake_minimum_required (VERSION 3.10)\n\nproject(hello VERSION 1.0)\n\nadd_executable(hello main.cpp math.cpp)\n```\n\nif too much source files, use\n\n```cmake\naux_source_directory(\u003cdir\u003e \u003cvariable\u003e)# clollect address of all source files and save the infomation to variable, without filter, which means these files could include suffixless files like makefile and CMakeLists.txt itself.\n```\n\nCMakeLists.txt:\n\n```cmake\ncmake_minimum_required (VERSION 3.10)\n\nproject(hello VERSION 1.0)\naux_source_directory(. DIR_SRCS)\n\nadd_executable(hello main.cpp math.cpp)\n```\n\nto directly collect files with appointed suffix use file(GLOB) or file(GLOB_RECURSE):\n```cmake\nfile(GLOB \u003cvariable\u003e \u003cglobbing-expression\u003e) #search files in current dir that matches globbing-expression.\nfile(GLOB_RECURSE \u003cvariable\u003e \u003cglobbing-expression\u003e) #also search child-dir resursively.\n```\n\n\n\n#### multiple-directories-and-multiple-source-files\n\n```\n./t1\n\t|\n\t+--- main.cpp\n\t|\n\t+-- /math\n        |\n        +--- math.cpp\n        |\n        +--- math.h\n```\n\nin this case, we need to write CMakeLists.txt for both root dir and math dir:\n\nroot dir:\n```cmake\ncmake_minimum_required (VERSION 3.10)\n\nproject(hello VERSION 1.0)\n\naux_source_directory(. DIR_SRCS)\n\nadd_executable(hello main.cpp math.cpp)\n\nadd_subdirectory(math) #add sublibraries so that CMakeLists.txt in sublibrarities can also be processed\n\ntarget_link_libraries(hello MathFunctions)#tell cmake that main should have to link a library named MathFunctions\n```\n\nsub dir:\n\n```cmake\naux_source_directory(. DIR_MATH_SRCS)\n\n# compile the source files in the src directory into a static link library\nadd_library(MathFunctions ${DIR_MATH_SRCS})\n```\n\n\n\n####  customize-compilation-options\n\n`configure-file`:\n\n```\nconfigure_file(\n    \"${SOURCE_FILE}\"  # source files address\n    \"${DESTINATION_FILE}\"  # target files address\n    [COPYONLY]  # selectable, if selected, cmake simply copy files, without variable substitution\n)\n```\n\n`option`:\n\n```\noption(\u003cOPTION_NAME\u003e \"\u003chelp description\u003e\" \u003cVALUE\u003e)\n```\n\n\n\nroot CMakeList.txt:\n\n```cmake\ncmake_minimum_required (VERSION 3.10)\n\nproject(hello VERSION 1.0)\n\n# add a configure header, to process cmake settings toward source code, so that we can \nconfigure_file(\n    \"${PROJECT_SOURCE_DIR}/config.h.in\" #${PROJECT_SOURCE_DIR} is an auto variable regarding source address.\n    \"${PROJECT_BINARY_DIR}/config.h\"\n)\n\n#define weather to use our self-define mathfunction library\noption(\n    USE_MYMATH\n    \"Use provided math implementtation\" ON\n)\n\n# weather to add mathfunctions library\nif (USE_MYMATH)\n    include_directories(\"${PROJECT_SOURCE_DIR}/math\")\n    add_subdirectory(math)\n    set(EXTRA_LIBS ${EXTRA_LIBS} MathFunctions)\nendif(USE_MYMATH)\n\naux_source_directory(. DIR_SRCS)\n\nadd_executable(hello main.cpp)\n\ntarget_link_libraries(hello ${EXTRA_LIBS})#tell cmake that main should have to link a library named MathFunctions\n```\n\nin `main.cpp`:\n\n```cpp\n// main.cpp\n\n#include\u003ciostream\u003e\n#include\"config.h\" //auto-generate by cmake from config.h.in, if not include, `#ifdef` always false\n\n#ifdef USE_MYMATH\n    #include \"math/math.h\"\n#else \n    #include \u003cmath.h\u003e\n#endif\n\nint main(){\n    std::cout \u003c\u003c \"hello world\" \u003c\u003c std::endl;\n    \n#ifdef USE_MYMATH\n    math();\n#else \n    std::cout \u003c\u003c \"im standard math lib\" \u003c\u003c std::endl;\n#endif\n\n    return 0;\n}\n```\n\nin `config.h.in`:\n\n```\n#cmakedefine USE_MYMATH\n```\n\nthen on bash:\n\n`cmake .` or `cmake -USE_MYMATH OFF` default value is ON.\n\n\n\n#### install-and-test\n\ninstall() in cmake use to appoint files, libraries and executable files that should be copied to the system installation directory during the build process. \n\nadd the following to math/CMakeLists.txt:\n\n```cmake\n#specify math library's installing address\ninstall (TARGETS math DESTINATION bin)\ninstall (FILES math.h DESTINATION include)\n```\n\nadd the following to the ending of root CMakeLists.txt:\n\n```cmake\ninstall (TARGETS hello DESTINATION bin)\ninstall (FILES \"${PROJECT_BINARY_DIR}/config.h\" DESTINATION include)\n```\n\nthen hello and libmath.o that generated will be copied to /usr/local/bin, and math.h and config.h will be copied to /usr/local/include. /usr/local is the default installing root address,we can modify variable CMAKE_INSTALL_PREFIX to appoint the target address.\n\n---\n\ncmake provide a tool named CTest ,  if we want our project has a test function, what we need to do is to  add `add_test` in our `CMakeList.txt`.\n\n```cmake\nadd_test(NAME \u003ctest_name\u003e\n          COMMAND \u003ccommand\u003e [\u003carg1\u003e \u003carg2\u003e ...]\n          [CONFIGURATIONS \u003cconfig1\u003e [\u003cconfig2\u003e...]]\n          [WORKING_DIRECTORY \u003cdir\u003e]\n          [COMPILE_DEFINITIONS \u003cdef1\u003e [\u003cdef2\u003e...]])\n```\n\nin CMakeLists.txt:\n\n```cmake\nenable_testing()\n\n# test weather testing program can run successfully\nadd_test (test_run hello) #if hello need parameter, use add_test (test_run hello \u003cpm1\u003e ...)\n\n#test weather help-info can prompt normally\nadd_test (test_usage hello)\nset_tests_properties (test_usage\n\tPROPERTIES PASS_REGULAR_EXPRESSION \"Usage: .* base exponent\") #`PASS_REGULAR_EXPRESSION`: check if the output contians the string \"Usage: .* base exponent\"\n\t\n#add_test (test_case_1 hello pm1 pm2)\n#set_tests_properties (test_case_1\n#\tPROPERTIES PASS_REGULAR_EXPRESSION \"xxx\")\n#\n#add_test\n#......\n```\n\nauto-test: **write macro**\n\n:star:example:star:\n\n```cmake\nmacro (do_test arg1 arg2 result)#numbers of args depend on your function.\n  add_test (test_${arg1}_${arg2} Demo ${arg1} ${arg2})\n  set_tests_properties (test_${arg1}_${arg2}\n    PROPERTIES PASS_REGULAR_EXPRESSION ${result})\nendmacro (do_test)\n\n#do_test（arg1 arg2 \"part of target\")\n```\n\n\n\n#### support-gdb\n\nactive `-g` option in debug mode.\n\n```cmake\n#setup compile options for different build type\nset(CMAKE_BUILD_TYPE \"Debug\")\nset(CMAKE_CXX_FLAGS_DEBUG \"$ENV{CXXFLAGS} -00 -Wall -g -ggdb\")\nset(CMAKE_CXXX_FLAGS_RELEASE \"$ENV{CXXFLAGS} -03 -Wall\")\n```\n\nthen you can construct your project in Debug mode:\n\n```bash\ncmake -DCMAKE_BUILD_TYPE=Debug .\nmake\n```\n\nstart your executable files:\n\n```bash\ngdb ./your exectable\n```\n\n\n\n#### adding-environment-detection\n\nexcample: when we need to use pow() function, first we need to check weather system contains pow()\n\n`check_function_exists(\u003cfunction_name\u003e \u003cvariable\u003e)` if function exists, the value of variable will be TRUE.\n\n- add CheckFunctionExists.cmake macro at root CMakeLists.txt before `configure_file`\n  ```cmake\n  #check if system support pow() function\n  include (${CMAKE_ROOT}/Modules/CheckFunctionExists.cmake)\n  check_function_exists (pow HAVE_POW)\n  ```\n\n- modify config.h.in:\n  ```cmake\n  #cmakedefine HAVE_POW\n  ```\n\n- use macro and function in main.cpp, like:\n  ```c++\n  #ifdef HAVE_POW\n  \tstd::cout \u003c\u003c \"now we use standard function\" \u003c\u003c std::endl;\n  #else\n  \tstd::cout \u003c\u003c \"user define function\" \u003c\u003c std::endl;\n  #endif\n  ```\n\n  \n\n#### adding-version-number\n\n- ```cmake\n  project(\u003cproject name\u003e VERSION x.x.x)\n  ```\n\n- ```cmake\n  #condition version\n  if (condition1)\n  \tset(PROJECT_VERSION \"1.0.0\")\n  else()\n  \tset(PROJECT_VERSION \"1.0.0\")\n  endif()\n  ```\n\n- ```cmake\n  set(\u003cproject name\u003e_VERISON_MAJOR 1)\n  set(\u003cproject name\u003e_VERSION_MINOR 0)\n  ```\n\n- ```cmake\n  #when store the version number in a single file\n  file(READ \"version.txt\" PROJECT_VERSION)\n  ```\n\nget version number in source code, for excample, cpp:\n\n```c++\n//config.h.in\n#define hello_VERSION_MAJOR @hello_VERSION_MAJOR@\n#define hellp_VERSION_MINOR @hello_VERSION_MINOR@\n```\n\ndo not forget to add `#include \"config.h\"` in cpp file.\n\n\n\n#### generate-installer\n\nat the endding of root CMakeLists.txt, add:\n\n```cmake\n#build a CPack installer\ninclude (InstallRequiredSystemLibraries)\nset(CPACK_GENERATOR \"ZIP\")\nset(CPACK_PACKAGE_NAME \"hello\")\nset(CPACK_RESOURCE_FILE_LICENSE\n\t\"${CMAKE_CURRENT_SOURCE_DIR}/License,txt\")#ser license\nset(CPACK_PACKAGE_VERSION \"${VERSION}\")\n#set(CPACK_PACKAGE_VERSION_MAJOR \"${hello_VERSION_MAJOR}\")#some CPack variable\n#set(CPACK_PACKAGE_VERSION_MINOR \"${hello_VERSION_MINOR}\")\nset(CPACK_PACKAGE_CONTACT \"Nemo 1774747097@qq.com\")\ninclude(CPack)\n```\n\ngenerate binary installer:\n\n```bash\ncpack -C CPackConfig.cmake\n```\n\ngenerate source code installer:(need compile and install by yourself)\n\n```bash\ncpack -C CPackSourceConfig.cmake\n```\n\n\n\n#### *migrate-projects-from-other-platforms-to-CMake*\n\n- autotools\n- qmake\n- ...\n"])</script><script>self.__next_f.push([1,"9:T529,\n\u003e ***sudo apt install Cmake***\n\n### Cmake\n\n***[CMake Tutorial — Mastering CMake](https://cmake.org/cmake/help/book/mastering-cmake/cmake/Help/guide/tutorial/index.html#introduction)***\n\n\n\n### `CMakeLists.txt`\n\n`cmake_minimum_required()`: Run Cmake function with a compatible version od Cmake.\n\n\u003e - ```cmake\n\u003e   cmake_minimum_required(VERSION \u003cmin\u003e[...\u003cpolicy_max\u003e] [FATAL_ERROR])\n\u003e   ```\n\n`project()`: start a project and set the name, other project level info. \n\n`add_executable()`: create an executable file using the specified source code files.\n\n\n\n#### step1:  basic starting point\n\nmost simple CMakeLists.txt:\n\n```cmake\ncmake_minimum_required(VERSION 3.10)\n\n#set the project name\nproject(Tutorial)  #you can also use PROJECT, cmake is case insensitive\n\n#add the executable\nadd_executable(Tutorial tutorial.cxx)\n```\n\n\n\n#### adding a version number and configured header file\n\nset version number:\n\n```cmake\nproject(tutorial VERSION 1.0)\n```\n\nconfigure a header file to pass version number to source code:\n\n```cmake\nconfigure_file(TutorialConfig.h.in TutorialConfig.h)\n```\n\nthe config file will be written into the binary tree. add that directory to the list of paths to search for include  files. add the following:\n\n```cmake\ntarget_include_directories(Tutorial PUBLIC \n\t\t\t\t\t\t\t\"${PROJECT_BINARY_DIR}\"\n\t\t\t\t\t\t\t)\n```\n\na:T1998,"])</script><script>self.__next_f.push([1,"\n### ***Regex***\n\n[**学习、受启发于deerchao的教程**](https://deerchao.cn/tutorials/regex/regex.htm)\n\n\u003e what is regex? something similer to wildcard, but more complex, more flexible and strong.\n\n**matecharacter**: special character that has special rule to match characters.\n\n\u003e `.`: match anycharacters except `\\n`\n\u003e\n\u003e `\\w`: match letters, numbers, _ (and chinese), [a-z0-9A-Z_]\n\u003e\n\u003e `\\s`: match blank characters include `\\n`\n\u003e\n\u003e `\\d`: match numbers\n\u003e\n\u003e `\\b`: match the beginning or ending of characters, autually, it matches a place that one or both of former and latter character match `\\w`\n\u003e\n\u003e `^`: match the beginning of characters\n\u003e\n\u003e `$`: match the ending of characters\n\nexamples:\n\n`\\bhi\\b`: precise match \"hi\"\n\n`\\bhi\\b.*\\bLucy\\b`: match \"hi [...] lucy\"\n\n`\\ba.*\\b`: match words start with letter a\n\n`\\b\\w{6}\\b`: match words with 6 characters\n\n`\\b\\d{5, 12}\\b`: match numbers that no less than 5 digits and no more than 12 digits.\n\n`\\b\\d{5, 12}@qq.com\\b`: match QQ mail box\n\n`^\\w*@\\w{?, ?}.\\w{2, ?}$`: match any mail box(i have forgot how many characters a mail boox have).\n\n**meaning-transform**: `\\`, transform matecharacter into normal character if you want the matecharacter itself, including `\\\\`\n\nexample: `\\($*\\).o`: ?\n\n**repetition**: \\\n\n\u003e `*`: repeat zero or more times\n\u003e\n\u003e `+`: repeat one or more times\n\u003e\n\u003e `?`: repeat 0 or 1 times\n\u003e\n\u003e `{n}`: repeat n times\n\u003e\n\u003e `{n,}`: repeat n or more times\n\u003e\n\u003e `{n, m}`: repeat no less then n times but no more than m times\n\nexample: `^\\w+`: match the first words in a sentense.\n\n**character class**: to match none-matecharacters\n\n`[aeiou]`, match a, e, i, o, u\n\n`[.?!]`: match punctuation like ., ?, !\n\n`[0-9]`: equal to `\\d`\n\n[a-z0-9A-Z_]: equal to `\\w`\n\n`\\(?0\\d{2}[)-]?\\d{8}`: match phonre numbers start with 0\n\n**if-else**: |\n\n`\\(?0\\d{2}[)-]?\\d{8}` actually can match characters (023-32142131, which is the wrong format.\n\nthe right answer is `\\(0\\d{2}\\)[- ]?\\d{8}|0\\d{2}[- ]?\\d{8}`\n\nhowever, you should focus on the order, for example:\n\n`\\d{5}-\\d{4}|\\d{5}` is right, but `\\d{5}|\\d(5)-\\d{4}` is wrong, because what matches `\\d{5}-\\d{4}` can match `\\d{5}`, so it match `\\d{5}` and would not think about the other branches. just like if-else conditions in C++ and python.\n\n**group**: mostly for repetition of multi-characters, and auto-distribute group codes for groups, code 0 refer to the whole expression. \n\n`(\\d{1,3}\\.){3}\\d{1,3}` repeat 3 times for `\\d{1, 3}\\.` .\n\n`((2[0-4]\\d|25[0-5]|[01]?\\d\\d?)\\.){3}(2[0-4]\\d|25[0-5]|[01]?\\d\\d?)`: matches right ip address. to under stand this expression, understanding `2[0-4]\\d|25[0-5]|[01]?\\d\\d?`id the most important.\n\n**autonymy**: like ! in python and C++\n\n`\\W`（capital, follow the same): `!\\w`\n\n`\\S` , `\\D` , `\\B`, \n\n`[^exp]`: matches any characters except e, x, p\n\n**backrefer**\n\nby default, from lest to eight , marked by `(`, the group would automatically get a code from 1 on.\n\n`\\b(\\w+)\\b\\s+\\1\\b` can match repeated words like `go go`. `\\1` here is the content that `\\w+` matched such as `go`.\n\n`\\b(?\u003cWord\u003e\\w+)\\b\\s+\\k\u003cWord\u003e\\b`: match repeated words and assign the group with code `word`.\n\n- capture: \n\n  \u003e (exp): match and capture characters **into groups** and auto assign code.\n  \u003e\n  \u003e (?\u003cname\u003eexp): match and capture cahracters and assign the group `name` as code.\n  \u003e\n  \u003e (?:exp): match but not capture characters and also not assign codes.\n\n- assert: match a position but not consume it.\n\n  \u003e (?=exp): matches location before exp, like ^.\n  \u003e\n  \u003e - `\\b\\w+(?=ing\\b)` match characters before ing, such as:singing -\u003e sing, dancing -\u003e danc\n  \u003e\n  \u003e (?\u003c=exp): matches location after exp,. like $.\n  \u003e\n  \u003e - `(?\u003c=\\bre)\\w+\\b` match characters after re, such as: reading -\u003e ading, reset -\u003eset.\n  \u003e\n  \u003e `(?\u003c=\\s)\\d+(?=\\s)`matches numbers that barrier by blank character.\n  \u003e\n  \u003e (?!exp): match a location that not follow by exp\n  \u003e\n  \u003e - `\\b\\w*q[^u]\\w*\\b`: matches words that have a q that without a u bellow, however it can also match a word that the q is the last letter of the word, for example, it can match`iraq fighting`. and `\\b\\w*q(?!u)\\w*\\b` is what you need because (?!u) would not consume the letter bellow the q.\n  \u003e - `\\d{3}(?!\\d)` match 3 numbers without a number bellow.\n  \u003e - `\\b((?!abc)\\w)+\\b` match a word that do not contain the `abc`.\n  \u003e\n  \u003e (?\u003c!exp): match a location that not following exp\n  \u003e\n  \u003e - `(?\u003c![a-z])\\d{7}` matches 7 numbers without lowercase letter on the front.\n  \u003e\n  \u003e `(?\u003c=\u003c(\\w+)\u003e).*(?=\u003c\\/\\1\u003e)` matches content in simple HTML label without attributes.\n\n**comment**\n\nuse (?#comment) to contain comment like (?#这是注释)\n\nactive \"ignore blank characters in mode\" choice is recommended. and so that you can write commend like this:\n```\n(?\u003c=    # 断言要匹配的文本的前缀\n\u003c(\\w+)\u003e # 查找尖括号括起来的内容\n        # (即HTML/XML标签)\n)       # 前缀结束\n.*      # 匹配任意文本\n(?=     # 断言要匹配的文本的后缀\n\u003c\\/\\1\u003e  # 查找尖括号括起来的内容\n        # 查找尖括号括起来的内容\n)       # 后缀结束\n```\n\n**Greed and laziness**\n\nregex always try to match as much as characters, for example, `aabab`, a.*b can match the whole characters but not only `aab`,  chich called greed.\n\nsometimes we need regex match as less as it can. then we can simply add `?` bellow.\n\na.*?b match `aab`.\n\n`*?`, `+?`, `??`, `{n, m}`, `{n,}`\n\n**processing option**\n\n`IgnoreCase`: ignore differences between capital letters and lowercase letters.\n\n`Multiline`: change `^` and `$` . now they the beginning and ending of one line, not words.\n\n`Singleline(dotAll)`: change `.`, make it can match all characters (including `\\n`), and is not limited in one line.\n\n`IgnorePatternWhitespace`: ignore unescaped white space in expression and active comments marked by #.\n\n`ExplicitCapture`: only capture groups that have been explicitly tag.\n\n***recursive matching**\n\nmatch nesting multi-levels structure. but hard. omit.\n\n``(?`group`)``, ``(?`-group`)``, ``(?(group)yes|no)``, (?!)\n\nexample:\n\n```\n\u003c                   #最外层的左括号\n  [^\u003c\u003e]*            #它后面非括号的内容\n  (\n      (\n        (?'Open'\u003c)  #左括号，压入\"Open\"\n        [^\u003c\u003e]*      #左括号后面的内容\n      )+\n      (\n        (?'-Open'\u003e) #右括号，弹出一个\"Open\"\n        [^\u003c\u003e]*      #右括号后面的内容\n      )+\n  )*\n  (?(Open)(?!))     #最外层的右括号前检查\n                    #若还有未弹出的\"Open\"\n                    #则匹配失败\n\n\u003e                #最外层的右括号\n```\n\n### ***others***:\n\n![other grammar](./picture/regex_other_grammar.png)\n\n"])</script><script>self.__next_f.push([1,"b:T9f9,"])</script><script>self.__next_f.push([1,"\n- #### Monte Carlo\n\n  - Probability approximation\n  - definite integral approximation\n  - Expectation approximation\n  - stochastic gradient\n    - Stochastic gradient allows for faster approximation of results\n\n- ### Basic concepts of reinforcement learning\n\n  - #### markov decision process, MDP\n  \n    - agents interact with the environment\n    - agents makes decisions and actions\n    - environment act as rules in the interaction\n    - state: all the information for one frame\n    - state space: a set of state(limited or infinite countable)\n    - action: agents' s decision base on current state\n    - action space: a set of possible decisions\n    - **reward**: value of the decision, defines by us.\n    - **state transition**:\n      - Deterministic state transfer is a special case of stochastic state transfer\n  \n  - policy: agents make decision base on the state.\n  \n    - \u003e The goal of reinforcement learning is to obtain a strategy function,the strategy can be deterministic or stochastic.\n  \n    - stochastic policy:  input state, output possibility of actions base on the state (probability density function).\n  \n    - deterministic policy: input state, output deterministic action instead of possibility (0-1 density function) - \u003e a little similar to max function.\n  \n    - agent environment interaction: agent make decision base on the possibility, then programs calculate the new state and return a reward for agent.\n  \n  - stochasticity: action and state are the sources of stochasticity.\n  \n    - \u003e markov property: the next state only relevant with the state and action now, and irrelevant with state and action before.\n  \n    - trajectory: all the actions, states, rewards that observable for agent in one episode.\n  \n  - return and discounted return: \n  \n    \u003e add up rewards in an episode. consist of return and discounted return(more often)\n  \n    - return : discount factor = 1\n    - discounted return : discounted factor \u003c 1\n    - stochasticity : fundamentally because of the stochasticity of action and state.\n    - finite-horizon MDP and infinite-horizon MDP:\n      - finite-horizon MDP has a terminal state of one episode.\n      - infinite-horizon MDP should attach a discounted return that smaller than 1 or its return can go infinite.\n  \n  - value function\n  \n    - \u003e expectation of return, reflecting the  current situation good or bad, the larger it is, the better the current situation\n  \n    - action-value function: the result of Q(action-value function) is the expectation of U(discounted return) in current situation."])</script><script>self.__next_f.push([1,"c:T23c6,"])</script><script>self.__next_f.push([1,"\n## ***docker***\n\n- \u003e windows desktop version\n\n- install directly from official website\n\n- or run ` winget install Docker.DockerDesktop ` on powershell\n\n- in this way your docker'root is in windows but not wsl-ubuntu, all your commands should be executed on a windows terminal, for example, ` sudo systemctl restart docker ` on linus should be `Restart-Service docker` on windows or you can just restart it on docker desktop' s UI\n\n- mirror gas pedal\n\n  - docker desktop -\u003e settings -\u003e  Use the wsl2 based engine\n\n  - -\u003e resources -\u003e change dick image location\n\n  - -\u003e docker engine -\u003e\n\n  - ```json\n    {\n        \"builder\": {\n          \"gc\": {\n            \"defaultKeepStorage\": \"20GB\",\n            \"enabled\": true\n          }\n        },\n        \"experimental\": true,\n        \"registry-mirrors\": [\n          \"https://hub-mirror.c.163.com\",\n          \"https://mirror.baidubce.com\",\n          \"https://dzoprv55.mirror.aliyuncs.com\"\n        ]\n    }\n    ```\n\n  - -\u003e APPLY \u0026 RESTART(lower right)\n\n- get image\n\n  - ```bash\n    $ docker pull [选项] [Docker Registry 地址[:端口号]/]仓库名[:标签] \n    ```\n\n  - such as `$ docker pull ubuntu:22.04`\n\n  - for more `$ docker pull --help`\n\n- run\n\n  - ```bash\n    docker run -it --rm ubuntu:22:04 bash # ``--rm`` here means remove docker after exit\n    \t\t  \n    docker run ubuntu:18.04 /bin/echo 'Hello world'\n    \t\t  \n    docker run -t -i ubuntu:18.04 /bin/bash\n    ```\n\n  - `-i`: interactive\n\n  - `-t`: open terminal (pseudo-tty)\n\n  - ```bash\n    $ docker container start # start exited docker\n    \t\t  \n    ps | top # list pocesses\n    ```\n\n  - `-d`:guarded state operation\n\n  - without `-d`:\n\n    - ```bash\n      $ docker run ubuntu:18.04 /bin/sh -c \"while true; do echo hello world; sleep 1; done\"\n      hello world\n      hello world\n      hello world\n      hello world\n      ```\n\n  - with `-d`:\n\n    - ```bash\n      $ docker run -d ubuntu:18.04 /bin/sh -c \"while true; do echo hello world; sleep 1; done\"\n      \t\t\t  77b2dc01fe0f3f1265df143181e7b9af5e05279a884f4776ee75350ea9d8017a\n      ```\n\n  - to see docker info: `docker container ls`\n\n  - to see output of docker: `docker container log`\n\n  - to go into containers that was running background (start with `-d` parameters)\n\n    - `docker attach` or `docker exec`(recommened)\n\n    - `docker attach` - example:\n\n      - ```bash\n        docker run -d ubuntu\n        \t\t\t\t  \n        docker contianer ls\n        \t\t\t\t  \n        docker attach xxx\n        root@xxx:/#\n        ```\n\n      - notice: if you exit from this terminal, it could cause the stop of docker container\n\n    - `docker exec` -example:\n\n      - ```bash\n        docker run -d ubuntu\n        \t\t\t\t  \n        docker container ls\n        \t\t\t\t  \n        docker exec -i xxx bash # start bash shell in interative mode\n        \t\t\t\t  \n        docker exec -it xxx bash\n        ```\n\n      - if you exit from this bash, it could not cause the stop of docker container, this is why we recommend `docker exec`.\n\n- stop container\n\n  - ```bash\n    docker container stop # stop a runing container\n    \t\t  \n    exit # stop the terminal\n    \t\t  \n    docker container ls -a # view containers stopped\n    \t\t  \n    docker container restart # stop a container, then restart it.\n    ```\n\n- export docker image \u0026\u0026 import\n\n  - ```bash\n    docker container ls -a\n    \t\t  \n    docker export [CONTAINER ID] \u003e xxx.tar\n    ```\n\n  - ```bash\n    cat ubuntu.tar | docker import - test/ubuntu:v1.0\n    \t\t  \n    docker image ls\n    \t\t  \n    docker import http://example.com/exampleimage.tgz example/imagerepo # import container from certain URL or dictonary\n    ```\n\n- delete containers\n\n  - ```bash\n    docker container rm xxx\n    \t\t  \n    docker container prune\n    ```\n\n- list docker images\n\n  - ```\n    docker image ls\n    \t\t  \n    dcoker system df\n    \t\t  \n    docker image ls -f dangling=true  # should dangling images\n    \t\t  \n    docker iamge prune # delete dangling image\n    \t\t  \n    # `` docker image ls `` only shows top images, if you want to see all images including middle images, run\n    docker iamge ls -a\n    \t\t  \n    docker iamge ls ubuntu\n    \t\t  \n    docker image ls ubuntu:22.04\n    \t\t  \n    docker image ls -f since=mongo:3.2 # filter since/before\n    \t\t  \n    docker image ls -f label=com.example.version=0.1\n    \t\t  \n    docker iamge ls -q # if you want to delete some iamges\n    \t\t  \n    docker image ls --format \"{{.ID}}: {{.Repository}}\"\n    \t\t  \n    docker image ls --format \"table {{.ID}}\\t{{.Repository}}\\t{{.Tag}}\"\n    ```\n\n- docker delete\n\n  - ```bash\n    \t\t  docker image ls\n      \t\t  \n    docker image rm xxx #generally speaking, only the first three characters of IMAGE ID is enough,such as ``docker image rm 501``\n    \t\t  \n    docker image rm centos\n    \t\t  \n    docker image ls --digest\n    docker image rm node@xxx:xxx #xxx:xxx is the digest of image\n    \t\t  \n    docker image rm $(docker image ls -q [repo's name])\n    docker image rm $(docker image ls -q -f before=mongo:3.2)\n    ```\n\n- `docker search` \u0026\u0026 `docker pull`\n\n- `docker push`\n\n  - ```bash\n    docker tag REPOSITORY:TAG docker-hub-username/REPOSITORY:TAG\n    \t\t  \n    docker image ls\n    \t\t  \n    docker push docker-hub-username/REPOSITORY:TAG\n    \t\t  \n    docker search docker-hub-username\n    ```\n\n- customize images\n\n  - ``git commit``  is not recommended as it can contain a lot of thing that are irrelevant and useless for your image. what's worse, the process you construct the image is invisible for everyone else. the image can go heavier over time. because the result of any modification on image is simply to mark, add, or modify the current layer without altering the previous layer.\n\n  - [x] we recommend to use **Dockerfile**, as a bash, we write every commends needed to construct the image on this file, so that it is visible for everyone to see the construction of the image. thus we can Optimize the construction of images to achieve light-weighting\n\n    - 1. make  a new **empty** dictionary, and name it **Dockerfile**\n         ```bash\n         mkdir [project]\n         cd [project]\n         touch Dockerfile\n         ```\n\n         and in Dockerfile:\n\n      2. ``FROM basic-image`` **important and must be placed at the beginning of file**\n         and particularly, ``FROM scratch`` : scratch is an empty(only with some matedata in it) virtual image, in this image, you first ``RUN`` is the first layer of the image.\n\n      3. ``RUN xxx``:\n         when you execute a ``RUN``, you construct a new layer of image.\n         so the number of ``RUN`` is the fewer the better. for example:\n\n         - use\n           ```bash\n           FROM debian:stretch\n           \n           RUN set -x; buildDeps='gcc libc6-dev make wget' \\\n               \u0026\u0026 apt-get update \\\n               \u0026\u0026 apt-get install -y $buildDeps \\\n               \u0026\u0026 wget -O redis.tar.gz \"http://download.redis.io/releases/redis-5.0.3.tar.gz\" \\\n               \u0026\u0026 mkdir -p /usr/src/redis \\\n               \u0026\u0026 tar -xzf redis.tar.gz -C /usr/src/redis --strip-components=1 \\\n               \u0026\u0026 make -C /usr/src/redis \\\n               \u0026\u0026 make -C /usr/src/redis install \\\n               \u0026\u0026 rm -rf /var/lib/apt/lists/* \\\n               \u0026\u0026 rm redis.tar.gz \\\n               \u0026\u0026 rm -r /usr/src/redis \\\n               \u0026\u0026 apt-get purge -y --auto-remove $buildDeps\n           ```\n\n         - instead of:\n           ```bash\n           FROM debian:stretch\n           \n           RUN apt-get update\n           RUN apt-get install -y gcc libc6-dev make wget\n           RUN wget -O redis.tar.gz \"http://download.redis.io/releases/redis-5.0.3.tar.gz\"\n           RUN mkdir -p /usr/src/redis\n           RUN tar -xzf redis.tar.gz -C /usr/src/redis --strip-components=1\n           RUN make -C /usr/src/redis\n           RUN make -C /usr/src/redis install\n           ```\n\n         as you can see,  \n\n         - [x] it is without necessity to build a lot of layers.\n         - [x] Getting into the habit of line breaks for different commands\n         - [x] You can also see that at the end of this set of commands the command to clean up your work has been added, removing the software that was needed in order to compile the build, cleaning up all the files that were downloaded and expanded, and also cleaning up the apt cache files. This is a very important step, as we said before, images are stored in multiple tiers, and what is in each tier does not get deleted in the next tier, it stays with the image. So when the image is built, it is important to make sure that each tier only adds what really needs to be added, and anything extraneous should be cleaned up.\n\n      4. In the directory where the **Dockerfile** file is located, execute the:\n         ```bash\n         docker build -t TAGname .  # -t here maens tag\n         ```\n\n      5. the ``.`` at the end of ``docker build`` commend means current dictionary. it aims to Specify Context. after that, some of you commends only go into effect within the context, such as ``COPY``:\n         ``COPY ../package.json /app`` and ``COPY /opt/xxxx /app`` can't work.\n         for more, see [[使用 Dockerfile 定制镜像 | Docker — 从入门到实践 (gitbook.io)](https://yeasy.gitbook.io/docker_practice/image/build)]\n\n"])</script><script>self.__next_f.push([1,"d:T2303,"])</script><script>self.__next_f.push([1,"\n***[2.shell工具和脚本_哔哩哔哩_bilibili](https://www.bilibili.com/video/BV1XN4y187zp/?p=3\u0026vd_source=8a614553fd42ac4044499e810a8166aa)***\n\n\n\n\n\n\n\n``ll [dictionary]``:\n\n - to see detail information of files in the dictionary\n\n - example: \n\n   ```bash\n   root@server-235-a4000:/anything# ll .\n   total 4\n   authority links owner group blocks last-interview\n   drwxrwxrwx 4 1021 1021   47 Jul  5 08:10 ./\n   drwxr-xr-x 1 root root 4096 Jul  6 03:45 ../\n   drwxrwxrwx 2 1021 1021   50 Jul  5 08:10 config/\n   drwxrwxrwx 2 root root   30 Jul  5 07:53 project/\n   ```\n\n - in the first colume:\n   'd' means \"dictionary\"\n   'r' means \"read\"\n   'w' means \"write\"\n   \"x\" means \"exec\"\n   '-' means \"no authority\"\n\n---\n\n`cd -` : \n\n rapid change of work dictionary\n\n---\n\n`echo`\n\n-  `ech o   \u003cstring\u003e` : print \u003cstring\u003e directly on console.\n\n- `echo \u003cstring\u003e \u003e \u003cfile\u003e` : overlay write \u003cstring\u003e into files. \n\n\u003e ` \u003e\u003e ` : readdition mode\n\n\n---\n\n`cat`\n\n- `cat \u003cfiles\u003e` : print the content of files.  mostly use.\n\n- `cat \u003c \u003cfiles\u003e` : similar to the former, seldom use, when use , mostly combined with  other commands likes `sort \u003c hello.txt | cat`\n\n- `cat \u003c \u003cfile1\u003e  \u003e \u003cfile2\u003e` : reload input to file1, and reload output to file2, overwrite.\n\n---\n\n**shell script** : `touch ****.sh`\n\n- function:\n\n```bash\n**** () {\n\tcd try_something/config/\n\tdocker exec -it anything_ubuntu22basic_image bash\n\t# here, $0 is the name of function, $1~$9...refer to the parameters. \n}\n```\n\n---\n\n\n```bash\nmkdir test\ncd $_\n```\n\nis equal to:\n\n```bash\nmkdir test\ncd test\n```\n\n`$_` is equal to `$1` (the first parameter) of the former expression.\n\n---\n\n`!!` , will be replaced by the former expression.\n\nfor example, if your operation not permitted, you can `sudo !!`.\n\n```bash\n$ rmdir test\noperation not permitted\n$ sudo !! # is equal to sudo rmdir test here.\n```\n\n---\n\n`$?` refers to the exit status of your former commands\n\n```bash\ngrep foobar sd.sh\necho $? #if no foobar in sd.sh, it would be 1, if not, it would be 0.\n```\n\n---\n\n- `$#` :  The number of parameters of the command\n\n- `$$` : process id of the command of what is running.\n\n- `$@` : all  the arguments of the command.\n\n---\n\n`grep`\n\n- `docker-compose ps || grep Up` : find if the output of `docker-compose ps` contains 'Up'.\n\n- `grep \u003cstring\u003e \u003cfilename\u003e` : find \u003cstring\u003e in \u003cfile\u003e\n- `grep \"pattern\" file1 file2 file3` : find same \"pattern0\" in multiple files.\n- `grep -r \"pattern\" /path/to/directory` : find \"pattern\" in dir and subdir.\n- `grep --help`\n\n---\n\n`tail` : \n\n- `tail --help`\n- `tail \u003cfile\u003e` : print the last 10 lines of file(by default) -\u003e in reverse order\n- `tail -n -20 \u003cfile\u003e` : in order\n- `tail -f \u003cfile\u003e` : always trace the latest content of file.\n\n---\n\n- `\u003e / \u003c` standard reload\n- `\u003e\u003e / \u003c\u003c` add reload\n- `2\u003e` standard error *output* reload (no`2\u003c`, not legal)\n- `\u0026\u003e`  standard *output* reload and standard error *output* reload (by default /dev/null)\n\n---\n\n`ls` : \n\n- `ls *.sh` : find files with special suffix.\n\n- ```bash\n    mkdir project1 project2\n    mkdir project23\n    ls project?  #project1 project2\n    ls project?*   #project1 project2 project23\n    ```\n\n---\n\n`convert` : image processing\n\n- `convert input.jpg output.png` : change format.\n\n- `convert input.jpg -resize 800x600 output.jpg` : change height and width.\n\n- `convert input.jpg -crop 100x100+50+50 output.jpg` : cut image\n- `convert input.jpg -rotate 90 output.jpg` : rotate the image.\n- `convert input.jpg -colorspace Gray output.jpg` change color.\n- `convert input.jpg watermark.png -gravity south -composite output.jpg` use another iamge as watermark.\n- `convert image1.jpg image2.jpg -append output.jpg` : combine mult image into one.\n\n---\n\n`{}` : \n\n1. **brace expansion**\n\n- `touch project{1, 2}/src/test/test{1, 2, 3}.py `: this can touch totally 6 files at two different directory.\n\n- `convert input.{png, jpg}` : ?\n- `touch {foo,bar}/{a..j}` : touch foo/a ~ foo/j , bar/a~bar/j\n- ```bash\n  touch foo/s bar/y\n  diff \u003c(ls foo) \u003c(ls bar)\n  ```\n- \n\n---\n\n`diff` : \n\n- `diff file1.txt file2.txt` : find the differents of two files.\n- `diff -rq dir1 dir2` : find the differents of files in two directories.\n- `diff --help`\n\n---\n\n`shellcheck` : shell/bash script debug tool\n\n- ```bash\n  sudo apt-get update \u0026\u0026 sudo apt-get upgrade\n  sudo apt-get install -y shellcheck\n  ```\n\n- `shellcheck script.py`\n\n- `shellcheck script1.sh script2.sh`\n\n- `shellcheck $(find . -name \"*.sh\")`\n\n- `shellcheck -s bash -e SC2046 script.sh`\n\n- `shellcheck script.sh \u003e check_results.txt`\n\n---\n\n`man` : manual of commands.\n\n- `man ffmpeg` , `man rg` , `man tldr` and so on , run and u will know.\n\n---\n\n`find` :\n\n- `find . -name src -type d` : find dir that named as src in current dir\n\n- `find . -path '**/test/*.py' -type f` \n- ` find . -mtime -1` : -mtime -\u003e modify time | -1 -\u003e last day.\n- `find . -name \"*.tmp\" -exec rm {} \\` : `{}` -\u003e all files find matched | `\\` -\u003e claim the end of `rm` command\n\n- **fd-find** : better then find\n\n---\n\n`$()` : Used for command substitution, that is, to assign the output of a command to a variable\n\n`${}` : Used for variable expansion, that is, inserting the value of a variable into a string.\n\n---\n\n`seq` : to generate a set of numbers.\n\n- `seq \u003coptions\u003e \u003cstart\u003e \u003cend\u003e`\n- `seq -f \"%02g\" 0 9`  : \"%02g\" =\u003e numbers is formatted as the smallest two-digit number\n\n---\n\n`sed`: `sed [options] 'command' [file]`\n\n- `s/pattern/replacement/flags`\n\n  ```bash\n  sed 's/oldtest/newtest/g' file.txt #g : global replace , i : ignore case\n  ```\n\n- `sed '/delete the line that match this text/d' file.txt` : yes, the line!\n\n  ```bash\n  zixing.liao@server-235-a4000:/DATACENTER1/zixing.liao/try_something/shellPrac/day3$ cat test.txt\n  hello world\n  llohe wldor\n  sdajkskdhakjd\n  zixing.liao@server-235-a4000:/DATACENTER1/zixing.liao/try_something/shellPrac/day3$ sed '/hello/d' test.txt\n  llohe wldor\n  sdajkskdhakjd\n  ```\n\n- `i\\text`: insert text before matched line, `a\\text`: insert text after matched line.\n\n  ```bash\n  sed '/match text/a\\' #insert a new line after match line\n  ```\n\n- ```bash\n  sed '/match line/p' file.txt # print match words' line in file.txt\n  ```\n\n- `address1,address2 command`: line range\n\n  ```bash\n  sed -n '1,5p' file.txt # print line1~line5\n  ```\n\n- ```bash\n  sed -f script.sed file.txt # read commands from a script and deal file with these commands.\n  ```\n  \n- `df | sed '1d' | grep -v 'tmpfs' | awk '{print $NF}')`\n\n---\n\n`awk` : \n\n1. To print a specific column:\n   ```bash \n   awk '{print $column_number}' file\n   ```\n   - For example, print the second column in the file example.txt:\n     ```bash \n     awk '{print $2}' example.txt\n     ```\n\n2. Number of statistical lines:\n   `awk 'END{print NR}' file`\n   - For example, count the number of lines in the file example.txt:\n     `awk 'END{print NR}' example.txt`\n3. Number of statistical columns:\n   `awk '{print NF}' file`\n   - For example, count the number of columns in the first row of the example.txt file:\n     `awk 'NR==1{print NF}' example.txt`\n4. Filter line:\n   `awk '/pattern/' file`\n   - For example, print the line containing \"example\" :\n     `awk '/example/' example.txt`\n5. Calculate the sum:\n   `awk '{sum += $column_number} END{print sum}' file`\n   - For example, calculate the sum of the third column in the file example.txt:\n     `awk '{sum += $3} END{print sum}' example.txt`\n6. Condition print:\n   `awk '$column_number \u003e value {print $0}' file`\n   - For example, print the third column greater than 10 in the file example.txt:\n     `awk '$3 \u003e 10 {print $0}' example.txt`\n\n---\n\n`stat` : `stat [options] \u003cfile\u003e`\n\n- `stat file.txt`\n- `stat -h file.txt`\n- `stat -f /`\n- `stat --format=\"%A %n %s %w %u %g\\n\" file.txt`\n- `stat -c %a $F`\n\n---\n\n`rsync` : `rsync [options] \u003csource\u003e \u003ctarget\u003e`\n\n- `rsync -avz -e ssh /path/to/source user@remote:/path/to/destination`\n- `rsync -avz -e ssh user@remote:/path/to/source /path/to/destination`\n- `rsync -avu /path/to/source /path/to/destination`\n- `rsync -avz /path/to/source /path/to/destination`\n- `rsync -avhi /path/to/source /path/to/destination`\n- `rsync -avze 'ssh -i /path/to/private_key' /path/to/source user@remote:/path/to/destination`\n- `rsync -av --delete /path/to/source /path/to/destination`\n- `rsync -av --exclude='*.log' --exclude='/tmp/' /path/to/source /path/to/destination`\n\n---\n\n***it is very important to wrapped your shell variable with \"\" when you need to use it***\n\n1. prevent path expanding: \n   - if value of variable contains space, tab and \\n, it can cause some undefined actions.\n   - for example: if  `variable=your name`, and your command `cd $variable` is expanding to `cd your name`, and you know what will happen next, but `cd \"$variable\"` go as you want\n   - protect special symbols, see \"$1.\"\n   - if value of variable is none, it can cause something you cannot imagine.\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nshell script practice : [shell脚本一天一练-day1_哔哩哔哩_bilibili](https://www.bilibili.com/video/BV1ih4y1Y7nh/?spm_id_from=333.788\u0026vd_source=8a614553fd42ac4044499e810a8166aa)\n"])</script><script>self.__next_f.push([1,"e:T20e8,"])</script><script>self.__next_f.push([1,"\n### make\n\nfor C/C++, u define commands in ``Makefile``, like ``Dockerfile``\n\n***when you run ``make``, it will try to find Makefile in current dictionary,and run all commands in Makefile***\n\n***if u just want to run one of the commands, run``make [target]``***\n\n**Rule** : \n\n```makefile\ntarget-file: prerequisites-1 prerequisites-1\n\tcommands\n```\n\nsuch as:\n\n```makefile\nx.txt: a.txt b.txt\n\tcat a.txt b.txt \u003e x.txt #合并a.txt,b.txt作为x.txt\n```\n\n**phony-target**\n\n```makefile\n# ...other commands\n\nclean:\n\trm -f xx.xxx   #ponder: could we run other commands in ``clean`` command?\n\t\n# ...\n```\n\nsuch as:\n\n```makefile\nclean:\n\trm -f a.txt\n\trm -f b.txt\n```\n\nif u had made a ``clean.file`` it can disturb ``make`` recognizing ``clean`` command, or you can explicit declare:\n\n```makefile\n.PHONY: clean #tell make: do not recognize clean as a file\nclean:\n\t...\n```\n\nother phony targets: ``install``\n\n**multi-rules**\n\nfirst, example:\n\n```makefile\ncd:\n\tpwd\n\tcd ..\n\tpwd\n```\n\nresult:\n\n```bash\n$ make cd\npwd\n/home/ubuntu/makefile-tutorial/v1\ncd ..\npwd\n/home/ubuntu/makefile-tutorial/v1\n```\n\nwhy the result of ``pwd`` is the same before and after the command ``cd ..``?\n\nbecause make isolate a shell environment for every commands, command like single `cd ..` would not influence the environment of other commands.\n\nto see right result, you can separate each successive command with `;` like:\n\n```makefile\ncd_ok:\n\tpwd; \\\n\tcd .. ; \\\n\tpwd\n\techo \"right way\"\n```\n\n**do not print command(still print execute info)**\n\nadd `@` before the target command:\n\n```makefile\nno_output:\n\t@echo 'not display'\n\techo 'display'\n```\n\nrun `make` and u will see:\n\n```bash\n$ make no_output\nnot display\necho 'will display'\nwill display\n```\n\n**control ERROR**\n\nwhen make is executing commands, if an ERROR occur(return none-zero-value), it will stop working.\n\nsuch as you delete an not exist file.\n\n---\n\nin some moments, we want to ignore some ERROR and keep executing latter commands, add `-` before the command like:\n\n```makefile\nignore_error:\n\t-rm zzz.xxx\n\techo 'OK'\n```\n\nyou can ignore commands that can cause ERROR but not disturb logic.\n\n**make `.cpp` files**\n\nexamples:\n\n- `hello.h`:\n\n  ```cpp\n  // hello.h\n  \n  #ifndef HELLO_H\n  #define HELLO_H\n  \n  int hello();\n  \n  #endif\n  ```\n\n- `hello.cpp`:\n\n  ```cpp\n  #include\u003ciostream\u003e\n  #include \"hello.h\"\n  \n  int hello(){\n  \tstd::cout \u003c\u003c \"hello, world\" \u003c\u003c std::endl;\n      \n      return 0;\n  }\n  ```\n\n- `test.cpp`:\n\n  ```cpp\n  #include\u003ciostream\u003e\n  #include \"hello.h\"\n  \n  int main(){    //only one main function is allowed\n      std::cout \u003c\u003c \"preparing\" \u003c\u003c std:endl;\n      hello():\n      std::cout \u003c\u003c \"ok\" \u003c\u003c std::endl;\n      \n      return 0;\n  }\n  ```\n\n- `Makefile`:\n\n  ```makefile\n  test.out: test.o hello.o\n  \tg++ -o test.out test.o hello.o    #the first file after `-o` should be the file to be generate\n  \t\n  hello.o: hello.h hello.cpp\n  \tg++ -c hello.cpp  #not similar to `-o`, the `-c` could automatically generate .o files\n  \t\n  test.o: test.cpp hello.h\n  \tg++ -c test.cpp\n  \t\n  clean:\n  \trm -f *.o #remove all files with `.o` file suffix\n  \trm -f test.out\n  ```\n\n---\n\nsimilar to `Dockerfile`,  make only build and compile files that had changed(if you had run `make` before),such as:\n\n```bash\nroot@server-235-a4000:/anything/project# make\ng++ -c test.cpp\ng++ -c hello.cpp\ng++ -o test.out test.o hello.o\nroot@server-235-a4000:/anything/project# make\nmake: 'test.out' is up to date.\n```\n\nif u change `hello.cpp`, it only re-compile `g++ -c hello.cpp`.\n\n**implicit rule**:\n\nuse the former project as example, if you delete `.o` rules, just run:\n\n```makefile\ntest.out: test.o hello.o\n\tg++ -o test.out test.o hello.o\n\t\nclean:\n\trm -f *.o test.out\n```\n\nit okay and compile successfully:\n\n```bash\nroot@server-235-a4000:/anything/project# make\ng++    -c -o test.o test.cpp\ng++    -c -o hello.o hello.cpp\ng++ -o test.out test.o hello.o\n```\n\nit is because make had built-in implicit rules for `c`, `cpp`, `asm`, `fortran` and so on. if commands in makefiles lacks of defines of rules,it will automatically use implicit rules, however not all commands have implicit rules.\n\nsuch as for `cpp`, if `.o` lacks of rules, it will run:\n\n```makefile\nxxx.o: xxx.cpp\n\tg++ -c -o xxx.o xxx.cpp\n```\n\nbut for c/cpp, it can cause some problems: if we change the define of `.h`, as implicit rule of .o could not trace the .h files, at last the .o would not re-compile.\nfor more, \n[GNU Make - 内置规则目录](https://runebook.dev/zh/docs/gnu_make/catalogue-of-rule)\n\n[Implicit Rules (GNU make)](https://www.gnu.org/software/make/manual/html_node/Implicit-Rules.html)\n\n**variables**: to solve the repetition problems.\n\nuse the former Makefile as example, we can change it to this form:\n\n```makefile\nTARGET = test.out\n\n$(TARGET): test.o hello.o\n\tg++ -o $(TARGET) hello.o test.o\n\t\nclean:\n\trm -f *.o $(TARGET)\n```\n\ndefine format: `variable name = value` or `variable name = value`.\n\nusually define variable name with capital letter.\n\n---\n\nautomatically generate object list:\n\n```makefile\n# $(wildcard *.cpp)list all files with .cpp cuffix in current dictionary\n# use function patsubst to mode-replace so we can get hello.o and test,o\nOBJS = $(patsubst %.cpp, %.o, $(wildcard *.cpp))\nTARGET = test.out\n\n$(TARGET): $(OBJS)\n\tg++ -o $(TARGET) $(OBJS)\n\t\nclean:\n\trm -f *.o $(TARGET)\n```\n\n**built-in variables**: ...\n\n**automatic variables**\n\nsome variables in makefiles such as `$@` , `$^` and `$\u003c` called automatic variables,they automatically refer to relevant values. for example:\n\n```makefile\n# %@ refer to target files, $^ refer to prerequisites.\ntest.out: test.o hello,o\n\t$(++) -o $@ $^ #can cause ambiguity\n\t# $(++) -o $(@) $(^) #avoid ambiguity\n```\n\nfor better debug:\n\n```makefile\ntest.out: test.o hello.o\n\t@echo '$$@ = $@' //print target files\n\t@echo '$$\u003c = $\u003c' //print the first prerequisites\n\t@echo '$$^ = $^' // print all prerequisites\n\tg++ -o $@ $^\n```\n\nin this case i guess $ in makefile may work like \\ in cpp(\\n and \\\\n).\n\n**mode-rule**\n\n\u003e define by yourself, more flexible than implicit rules\n\n```makefile\nOBJS = $(patsubst %.cpp, %.o, $(wildcard *.cpp))\nTARGET = test.out\n\n$(TARGET): $(OBJS)\n\tg++ -o $(TARGET) $(OBJS)\n\t\n#mode-rules: when make **need** target xxx.o, automatically generate a xxx.o: xxx.c rule\n%.o: %.cpp\n\t@echo 'compiling $\u003c...'\n\tg++ -c -o $@ $^\n\nclean:\n\trm -f *.o $(TARGET)\n```\n\nhowever, this still cant solve the problem of changing .h could not make .cpp update\n\n**automatically prerequisites generation**\n\nparameter `-MM` can automatically find out the .h prerequisites of .cpp,with using `g++ -MM test.cpp`\n\n```makefile\nSRC_DIR = ./src\nBUILD_DIR = ./build\nTARGET = $(BUILD_DIR)/test.out\n\nCFLAGS = -Wall\n\n.PHONY: printdir all clean\n\n# ./src/*.cpp\nSRCS = $(shell find $(SRC_DIR) -name '*.cpp')\n# ./src/*.cpp -\u003e ./build/*.o\nOBJS = $(patsubst $(SRC_DIR)/%.cpp, $(BUILD_DIR)/%.o, $(SRCS))\n# ./src/*.cpp -\u003e ./build/*.d\nDEPS = $(patsubst $(SRC_DIR)/%.cpp, $(BUILD_DIR)/%.d, $(SRCS))\n\n# default target\nall: $(TARGET) printdir\n\nprintdir: # print current working dir\n\t@echo \"Current Directory: $(CURDIR)\"  \n\n$(BUILD_DIR)/%.d: $(SRC_DIR)/%.cpp # pattern rule, represent that .d files in build/ is built by the corresponding .cpp files in src/\n\t@mkdir -p $(dir $@); \\ \n\trm -f $@; \\\n\tg++ -MM $\u003c \u003e $@.tmp; \\\n\tsed 's, \\($*\\)\\.o[ :]*, \\1.o $@ : , g' \u003c $@.tmp \u003e $@; \\\n\trm -f $@.tmp\n\t\n# parameter -p ensure that before making target dictionary, its father dir has exist,\n# $(dir $@)is the target file's dictinary, for example, build/ for build/main.default\n# parameter -MM finds out the prerequisites of target files, $\u003c refer to the first prerequisites, \u003e $@.tmp redirect output to target .d file's temporary version\n# sed: stream editor; s: replace mode; g: global\n# \\($*\\)\\.o[ :]*: regex grammar, autonymy `\\` here aims to diliver ()  to sed editor accurately without interpreted by shell.\n# \t$*: auto-parameter for makefile, represent the basic name of file(without prefix and suffix)\n# \u003c $@.tmp: set $@.tmp(target.tmp) as input files\n# \u003e $@: write outputs in target file.\n\n$(BUILD_DIR)/%.o: $(SRC_DIR)/%.cpp\n\t@mkdir -p $(dir $@)\n\tg++ $(CFLAGS) -c -o $@ $\u003c\n\n$(TARGET): $(OBJS)   #generate test.out\n\t@echo \"building $@...\"\n\t@mkdir -p $(dir $@)\n\tg++ -o $(TARGET) $(OBJS)\n\nclean:\n\t@echo \"clean ...\"\n\trm -rf $(BUILD_DIR)\n\n-include $(DEPS) # include all the prerequisites in makefile can help make better update(why? i dont know)\n```\n\nhowever, this can be totally different in windows system.\n\nso, lets join Cmake.\n"])</script><script>self.__next_f.push([1,"f:T2f0d,"])</script><script>self.__next_f.push([1,"\n# Subagent 化 Skill 优化方法论\n\n## 为什么要用 Subagent 优化 Skill\n\n当 Skill 的步骤链变长时，单 Agent 架构会遇到一个根本性问题：**上下文污染（context pollution）**。\n\n每一步的 tool output、中间推理、临时文件内容都会积累到同一个上下文窗口。当模型需要做最后一步推理时，它要穿过前面 N 步产生的噪音。\n\n```\n单 Agent 的问题：\n┌─────────────────────────────────────────────┐\n│ Step 1: 读取文件 → +5000 token               │\n│ Step 2: 分析结构 → +2000 token               │\n│ Step 3: 运行测试 → +3000 token               │\n│ Step 4: 生成报告 → 要在 10000+ token 噪音    │\n│               中推理，性能急剧下降            │\n└─────────────────────────────────────────────┘\n```\n\n在小模型上（如 Qwen-35b-AWQ-int4、内网部署的量化模型），有效上下文窗口更小，问题更严重，模型直接崩坏或丢弃细节。\n\n**Subagent 的核心解决思路**：把信息利用率低（产生大量数据但后续只需要摘要）的步骤隔离到独立的上下文窗口中执行，主线只拿压缩后的摘要继续。每个 subagent 的上下文在完成时回收。\n\n## 第一步：诊断 —— 上下文账单\n\n画出 Skill 的完整流程，逐步骤填写上下文账单。这是整个优化工作的起点。\n\n### 上下文账单模板\n\n| # | 步骤名 | 操作 | 产生数据量 | 后续真正需要 | 信息利用率 |\n|---|--------|------|-----------|-------------|-----------|\n| 1 | 步骤 A | read_file / LLM / tool | ~N token | 用了哪些字段 | % |\n\n**信息利用率** = 该步骤产生的信息中，后续步骤实际需要引用的比例。\n\n- **\u003e 80%** → 保留在主线（如：用户的原始输入、核心推理决策）\n- **40-80%** → 可拆分也可不拆，取决于数据绝对量\n- **\u003c 40%** → **必须拆分为 subagent**\n\n### 案例：reportDoc\n\nreportDoc 的功能：接受 markdown（内容）+ docx 模板（样式），输出符合模板样式的 docx 文档。模板可以是文件，也可以是描述性文本。\n\n| # | 步骤 | 操作 | 产生量 | 后续需要 | 利用率 | 决策 |\n|---|------|------|--------|---------|-------|------|\n| 1 | 读 markdown | read_file | 全文 | 全文 | ~100% | 主线 |\n| 2 | 解析 docx 模板 | python-docx | ~5000+ token | 只需样式定义(名称/字体/字号/对齐)、表格结构、页眉页脚、占位符、说明行 | ~15% | **Subagent** |\n| 3 | 理解描述性模板 | LLM 解析 | ~500 token | 整段指令 | ~100% | 主线 |\n| 4 | markdown→docx 转换 | LLM 生成 + python-docx | ~2000+ token | 需要完整输出 | ~100% | 主线 |\n| 5 | 验证输出 docx | 检查样式/表格/页眉 | ~2000+ token | 只需 pass/fail + 缺失列表 | ~10% | **Subagent** |\n\n**结论**：步骤 2（模板解析）和步骤 5（结果验证）是优先改造目标。\n\n## 第二步：拆解 —— 确定 Subagent 边界\n\n### 核心原则\n\n**按上下文边界拆分，不按流程角色拆分。**\n\n错误示范（电话游戏）：\n```\nPlanner Agent → Implementer Agent → Tester Agent\n每次手都丢失信息，协调成本高，产出失真\n```\n\n正确做法：如果你读一个文件产生 5000 token 但后续只需要 200 token 的摘要，就这个读操作本身做成 subagent。\n\n### 决策树\n\n```\n某一步数据量 \u003e 1000 token 且利用率 \u003c 40%？\n  ├── 是 → 拆成 subagent\n  │     ├── 只依赖主线已有信息 → 可并行\n  │     └── 依赖另一个 subagent → 串行 chain\n  │\n  └── 否 → 保留在主线\n```\n\n### 常用模式\n\n```\n扇出-扇入（并行探索）：\n  Orchestrator → SubAgent A (并行) → 聚合\n               → SubAgent B (并行) → 聚合\n               → SubAgent C (并行) → 聚合\n\n流水线（生成→验证→修正）：\n  SubAgent: 生成 → [Revision Gate] → SubAgent: 修正 → ...\n\n上下文隔离（单一数据密集步骤）：\n  主线只拿摘要，subagent 读原始数据\n```\n\n### 案例：reportDoc 的拆分结构\n\n```\n主线 (Orchestrator) — 持有 markdown 全文 + 模版摘要(~150t) + 生成说明\n  │\n  ├── (并行) SubAgent: docx 模板解析器\n  │   输入: 模版文件路径\n  │   输出: 结构化样式摘要\n  │   压缩比: ~5000t → ~150t\n  │\n  ├── (串行) 主线: 理解模版结构 + 识别说明行\n  │\n  ├── (串行) 主线: 生成 python-docx 转换代码并执行\n  │\n  └── (串行) SubAgent: 结果验证器（Revision Gate 循环）\n       输入: 生成 docx 路径 + 预期检查项\n       输出: {pass, missing_items}\n```\n\n## 第三步：契约 —— Subagent 的输入输出协议\n\n每个 subagent 必须有明确的**结构化输入/输出契约**。输出必须是确定的 JSON 结构，主线直接拿来用，不需要额外推理。\n\n### 契约设计原则\n\n1. **输出必须有固定的 JSON schema** — 不写\"返回摘要摘要\"，写\"返回 `{styles: [{name, font, size, bold}]}`\"\n2. **主线不依赖 subagent 的中间推理** — 只依赖输出结构\n3. **单个 subagent 输出去重后 ≤ 300 token** — 超过说明压缩不够\n4. **在派发时给出输出格式示例** — subagent 执行时可直接参考\n\n### 案例：reportDoc 的契约设计\n\n#### SubAgent: docx-template-parser\n\n```python\n# 在 Skill 中用 delegate_task 调用\ndelegate_task(\n    goal=\"解析 docx 模板，抽取样式、表格结构、页眉页脚、占位符、说明行\",\n    context=f\"\"\"\n    模板文件路径: {template_path}\n    模式: file\n\n    输出必须严格按照以下 JSON 结构返回:\n    {{\n        \"styles\": [\n            {{\"name\": str, \"font\": str, \"size\": int, \"bold\": bool, \"color\": str, \"alignment\": str}}\n        ],\n        \"sections\": [\n            {{\"type\": \"header\"|\"footer\", \"content\": str}}\n        ],\n        \"tables\": [\n            {{\"rows\": int, \"cols\": int, \"header_style\": str, \"body_style\": str}}\n        ],\n        \"placeholders\": [str],\n        \"instruction_lines\": [int],\n        \"mode\": \"file\"\n    }}\n\n    使用 python-docx 读取模板文件，用 lxml 解析样式。\n    只返回 JSON，不要额外解释。\n    \"\"\",\n    toolsets=['terminal', 'file']\n)\n```\n\n#### SubAgent: docx-validator\n\n```python\ndelegate_task(\n    goal=\"验证生成的 docx 是否符合模板要求\",\n    context=f\"\"\"\n    生成的文件路径: {output_path}\n    预期检查项:\n    - 页眉内容是否正确应用\n    - 页脚内容是否正确应用\n    - 表格样式是否正确\n    - 说明行是否已删除\n    - 段落样式是否正确匹配\n\n    输出格式:\n    {{\n        \"pass\": true|false,\n        \"missing\": [str],\n        \"details\": {{\"header\": \"ok\"|\"missing\", \"footer\": \"ok\"|\"missing\", ...}}\n    }}\n    \"\"\",\n    toolsets=['terminal', 'file']\n)\n```\n\n## 第四步：门禁 —— 嵌入 Gate 质量控制\n\n在每个关键切换点插入 Gate 检查。共四种类型（源自 Gates Taxonomy）：\n\n| 类型 | 作用 | 失败时行为 |\n|------|------|-----------|\n| **Pre-flight** | 执行前检查前置条件 | 报错终止 |\n| **Revision** | 验证产出质量，最多 3 轮 | 循环修正或升级 |\n| **Escalation** | 超出能力范围，需要人决策 | 暂停等待用户 |\n| **Abort** | 紧急终止保护现场 | 保存当前产出，终止 |\n\n### Revision Gate 循环规则\n\n```\n轮次 1: 验证 → 发现问题 → 修正\n轮次 2: 验证 → 问题减少？ → 是→继续；否（未减少）→ 提前升级\n轮次 3: 验证 → 全部通过？ → 是→完成；否→升级给用户\n```\n\n核心优化：对比轮次 N-1 的问题数，如果没有减少则判定为停滞，直接 Escalation，不做无意义的反复重试。\n\n### 案例：reportDoc 的门禁\n\n```\n┌─ Pre-flight Gate ──────────────────────────\n│ 模版文件存在且可读？ → 否 → 报错\n│ markdown 非空？       → 否 → 报错\n│ python-docx 可用？     → 否 → 报错\n│\n├─ SubAgent: 模板解析\n│\n├─ 主线: 生成转换代码 + 执行\n│\n├─ Revision Gate ────────────────────────────\n│ SubAgent: 验证器检查输出\n│   通过 → ✅ 交付\n│   不通过 → 第 2 轮修正（最多 3 次）\n│     连续两次问题数不减少 → 提前升级\n│\n├─ Escalation Gate ──────────────────────────\n│ \"3 轮修正后问题未解决，请人工介入\"\n│\n└─ 完成\n```\n\n## 第五步：监控 —— 上下文预算管理\n\n对量化小模型最重要的是主动监控上下文使用率，在崩溃前降级。\n\n### 四级预算阈值（按模型窗口调整）\n\n建议 Qwen-35b-AWQ-int4 这类模型使用更严格的标准（假设有效窗口 ~8K-16K）：\n\n| 等级 | 使用率 | 行为 |\n|------|--------|------|\n| PEAK | 0-20% | 正常操作 |\n| GOOD | 20-30% | 优先读摘要，开始预判式派发 |\n| DEGRADING | 30-50% | 只读摘要，禁止新工具调用，完成当前即止 |\n| POOR | \u003e50% | 紧急 checkpoint，保存中间文件，终止 |\n\n### 估算方法\n\n每完成一步后，用 `字符数 / 4` 粗略估算 token 数（中文更密，可改为字符数 / 2）。如果连续两步都处于 DEGRADING 以上，将后续所有未执行的步骤强制 subagent 化。\n\n### 实现思路\n\n在主流程中增加一个工具函数：\n\n```python\ndef check_context_budget(step_name: str) -\u003e str:\n    \"\"\"\n    返回当前等级: \"PEAK\" | \"GOOD\" | \"DEGRADING\" | \"POOR\"\n    如果返回 POOR，调用方应立即 checkpoint 并终止。\n    \"\"\"\n    # 用当前对话的总 token 数（从前几步累计估算）除以模型的有效窗口\n    pass\n```\n\n## 改造后的 Skill 文件组织\n\n```\nskill-name/\n├── SKILL.md              # 顶层流程（Orchestrator 视角，只写调度逻辑）\n├── scripts/\n│   ├── parse_template.py  # SubAgent: 模板解析的独立脚本\n│   └── validate_output.py # SubAgent: 结果验证的独立脚本\n└── references/\n    └── subagent-contracts.md  # 所有 subagent 的契约文档\n```\n\nSKILL.md 顶层只写：\n\n```\n1. [Pre-flight] 检查前置条件\n2. 派发 SubAgent: 模板解析器，等待摘要\n3. 主线: 理解模版结构 + 识别说明行\n4. 主线: 生成 python-docx 转换代码\n5. [Revision Gate] 派发 SubAgent: 验证器\n   └── 最多 3 轮\n6. 交付\n```\n\n## 避坑\n\n| 陷阱 | 说明 |\n|------|------|\n| **过度拆分** | 短步骤（\u003c 3 步、数据量小）拆 subagent 只会增加 token 开销和延迟。Anthropic 实测 subagent 架构比单 agent 多 3-10x token。 |\n| **按角色拆** | Planner→Implementer→Tester 每次手丢失信息。应按上下文边界（信息能否压缩为摘要）拆。 |\n| **摘要幻觉** | Subagent 可能返回\"已完成\"但实际上什么也没做。验证方法：在契约中要求返回具体证据（文件名、具体值、行号）。 |\n| **契约不稳定** | 输出格式频繁改动 → 主线的解析逻辑要同步改。先定好 schema 再编码。 |\n| **忽略验证** | 没有 Revision Gate 的话，subagent 的错误会直接进入最终产出。每个 subagent 的输出必须有验证环节。 |\n\n## 速查卡\n\n```\n执行以下步骤改造任意 Skill：\n\n□ 1. 画上下文账单\n   标注每一步的数据量和信息利用率\n   标记利用率 \u003c 40% 的候选步骤\n\n□ 2. 确定拆分边界\n   决策树判断：可隔离？可并行？可串行？\n   画拆分结构图\n\n□ 3. 设计契约\n   每个 subagent 写 JSON 输入输出 schema\n   schema 定好后再编码\n\n□ 4. 嵌入 Gate\n   Pre-flight → Revision (≤3轮) → Escalation\n\n□ 5. 设定预算\n   按模型实际窗口设定四档阈值\n   超出时自动 subagent 化或 checkpoint\n```\n"])</script><script>self.__next_f.push([1,"10:T3b40,"])</script><script>self.__next_f.push([1,"\n\u003cdiv align=\"center\"\u003e\n\u003ch1\u003e📚 技术博客精选\u003c/h1\u003e\n\u003cp\u003e\u003ccode\u003e2026-06-24 18:49\u003c/code\u003e · \u003ccode\u003e共 43 篇精选\u003c/code\u003e\u003c/p\u003e\n\u003c/div\u003e\n\n---\n\n## 🏗️ 架构与设计 / Architecture \u0026 Design\n\n📄 **[Migrating Data Ingestion Systems at Meta Scale](https://engineering.fb.com/2026/05/12/data-infrastructure/migrating-data-ingestion-systems-at-meta-scale/)** `Meta Engineering`\n\u003e *Meta 数据摄入系统迁移实战——从单体管道到分布式数据湖的演进路线，如何处理 PB 级数据迁移的兼容性和回滚。*\n\n📄 **[SilverTorch: Index as Model — A New Retrieval Paradigm for Recommendation Systems](https://engineering.fb.com/2026/05/26/ml-applications/silvertorch-index-as-model-new-retrieval-paradigm-recommendation-systems/)** `Meta Engineering`\n\u003e *Meta 推荐系统新范式 Index as Model——将检索组件统一为单一模型，替代传统多阶段级联架构，性能提升显著。*\n\n📄 **[Modernizing the Facebook Groups Search to Unlock the Power of Community Knowledge](https://engineering.fb.com/2026/04/21/ml-applications/modernizing-the-facebook-groups-search-to-unlock-the-power-of-community-knowledge/)** `Meta Engineering`\n\u003e *FB Groups 搜索现代化改造——从 Elasticsearch 到向量检索+语义理解的混合架构升级，搜索相关度提升显著。*\n\n📄 **[Data Projects: Managing Data Assets at Netflix Scale](https://netflixtechblog.com/data-projects-managing-data-assets-at-netflix-scale-7ca25888591e?source=rss----2615bd06b42e---4)** `Netflix TechBlog`\n\u003e *Netflix 数据资产管理体系——从数据发现、血缘追踪到访问控制，如何在超大规模下保障数据治理。*\n\n📄 **[VMAF v1: Good Is Not Good Enough](https://netflixtechblog.com/vmaf-v1-good-is-not-good-enough-60d7e4244ea8?source=rss----2615bd06b42e---4)** `N
