\n\nKV Cache 是同一个请求内优化它的复用。但多个请求之间，如果 prompt 开头部分相同（称为 prefix），那 prefix 部分的 KV 是一样的——不需要每个请求都重新计算。\n\n### 3.2 工作原理\n\nvLLM 对每个 KV block 按内容计算 hash，把 hash 存入全局缓存表：\n\n```\n请求1: [金融系统prompt(800 token)][user_query_1(200 token)]\n请求2: [金融系统prompt(800 token)][user_query_2(200 token)]\n                    ↑\n         公共前缀 —— KV 完全一样，hash 命中后直接复用\n```\n\n具体流程：\n\n1. **Block 划分**：vLLM 将 KV cache 按固定大小（默认 16 token/block）分块\n2. **Hash 计算**：每个 block 的 KV 数据内容做 hash（基于 block 内所有 token 的 K、V 值）\n3. **全局缓存表**：hash → KV block 的映射，存储在 GPU 内存或 CPU 内存\n4. **新请求到达**：\n   - 前 16 个 token 的 block → 查 hash → 命中 → 从缓存取 KV block\n   - 第 17-32 token 的 block → 查 hash → 命中 → 从缓存取 KV block\n   - ...直到第一个 prefix 结束的 block（hash miss）\n   - 从 miss 位置开始正常 prefill\n5. **缓存淘汰**：LRU 策略，当 GPU 内存不够时淘汰最久未使用的 KV block\n\n### 3.3 效果\n\n| 配置 | Prefill 算力需求 | TTFT |\n|------|-----------------|------|\n| 不开 | 1000 token × 72B | ~3-8s |\n| 开（800 token 共享） | 200 token × 72B | ~0.5-2s |\n| **节省** | **80% prefill** | **~1-3s** |\n\n### 3.4 什么时候效果好\n\n- **System prompt 很长且跨请求大量重复**：如多 Agent 系统（5个agent共享prompt），或 Chatbot 系统 prompt\n- **多轮对话**：第一轮生成的 KV cache 在第二轮可以被 prefix 复用\n- **模型越大效果越明显**：prefill 计算量 = token × 参数量，72B 的 1 token ≈ 4B 的 18 个 token\n\n### 3.5 什么时候效果差/无效\n\n- 每个请求 prompt 完全不同，无公共前缀\n- 公共前缀极短（几个 token，vLLM block size 通常是 16）\n- 小模型（4B/7B），prefill 本身就是几十毫秒量级，省了也感受不到\n\n## 四、启用方式\n\n```bash\n# vLLM 启动时加一个参数即可\npython -m vllm.entrypoints.openai.api_server \\\n  --model Qwen/Qwen2.5-72B-Instruct-AWQ \\\n  --enable-prefix-caching            # ← 就这一行\n```\n\n应用层代码一行不用改。vLLM 自动做 block-level hash 匹配。\n\n## 五、vLLM Prefix Caching vs LMCache 对比\n\n### 5.1 LMCache 简介\n\nLMCache（GitHub 9.1k stars, Apache 2.0, UChicago）是一个独立的 KV cache 管理层，作为 daemon 运行。它把 KV cache 从\"临时中间产物\"变成了持久化、跨请求可复用的资源。\n\n### 5.2 核心能力\n\n| 能力 | vLLM Prefix Caching | LMCache |\n|------|-------------------|---------|\n| **复用位置** | 仅前缀 prefix | 任意位置（CacheBlend 技术） |\n| **存储层次** | GPU 显存 | GPU → CPU → SSD → Redis/S3 |\n| **持久性** | 请求结束即丢 | 持久化，daemon 重启不丢 |\n| **跨引擎** | 仅 vLLM 进程内 | vLLM / SGLang 之间共享 |\n| **PD分离** | 不支持 | 支持 prefill→decode 跨节点 KV 传输 |\n| **应用层改动** | 一行参数 | 装 daemon + 配存储后端 |\n| **观测能力** | 有限（vLLM metrics） | Prometheus + 命中率/生命周期追踪 |\n\n### 5.3 LMCache 的独特优势：CacheBlend（非前缀复用）\n\nvLLM 的 prefix caching 只能复用 prompt 开头的公共前缀。但实际场景中，相同的内容块可能出现在 prompt 的不同位置：\n\n```\n请求1: [sys_prompt][chunk_A][chunk_B][question]\n请求2: [sys_prompt][chunk_C][chunk_A][question]\n                                  ↑\n                   chunk_A 位置不同，vLLP prefix caching 必 miss\n                   LMCache CacheBlend 可以复用，只重算少量 token\n```\n\n这对 **RAG 场景** 尤其关键——不同用户问不同问题，但 retrieved chunks 大量重叠。\n\n### 5.4 选择建议\n\n| 场景 | 推荐方案 |\n|------|---------|\n| 共享 system prompt 的多 Agent 系统 | vLLM prefix caching ✅ 够用 |\n| 多轮长对话（跨轮复用） | LMCache（CPU offload + 持久化） |\n| RAG 场景，chunk 在不同 prompt 位置出现 | LMCache CacheBlend |\n| 单机单卡，简单场景 | vLLM prefix caching（零运维） |\n| 多节点 / PD 分离部署 | LMCache |\n\n### 5.5 显存优化补充\n\n**显存不够时的解决方案**（按推荐顺序）：\n\n1. **`--gpu-memory-utilization 0.9`**：控制 vLLM 占用多少显存\n2. **`--swap-space 64`**：vLLM 内置的 CPU swap，KV cache 不够时自动换出到 CPU 内存\n3. **`--max-num-seqs`**：限制并发请求数\n4. **LMCache**：更复杂的 tiered offload，但提供持久化和跨实例能力\n\n## 六、总结\n\n- KV Cache 是 Transformer decode 阶段的必然产物，解决\"不重复计算历史 token\"的问题\n- **vLLM Prefix Caching** 跨请求复用公共前缀的 KV cache，一行参数开启，省 30-80% prefill\n- **LMCache** 是更通用的 KV cache 管理层，解决非前缀复用、持久化和跨实例共享，但运维成本高\n- 选择建议：先开 `--enable-prefix-caching`，等到真正遇到\"显存不够\"或\"多轮对话 TTFT 太长\"的痛点时再考虑 LMCache\n\n## 参考\n\n- vLLM Automatic Prefix Caching 文档：https://docs.vllm.ai/en/stable/design/prefix_caching.html\n- LMCache GitHub：https://github.com/LMCache/LMCache\n- LMCache 论文：Yihua Cheng et al. \"LMCache: An Efficient KV Cache Layer for Enterprise-Scale LLM Inference\", arXiv:2510.09665\n- CacheBlend 论文：Jiayi Yao et al. \"CacheBlend: Fast Large Language Model Serving for RAG with Cached Knowledge Fusion\", EuroSys 2025\n"])</script><script>self.__next_f.push([1,"12:T25c6,"])</script><script>self.__next_f.push([1,"\n# DeepSeek-V4-Flash 内网 vLLM 部署完全指南\n\n## 一、模型规格\n\nDeepSeek-V4-Flash 是你从 ModelScope 下载的模型，核心参数：\n\n| 项目 | 值 |\n|------|-----|\n| 架构 | MoE（Mixture of Experts） |\n| 总参数量 | **284B** |\n| 激活参数量 | **13B**（每次推理只激活 13B，其余在 MoE 专家中稀疏路由） |\n| 专家数 | 256 个 routed experts + 1 个 shared expert |\n| 每 token 激活专家数 | 6 |\n| 上下文长度 | **1M tokens**（百万级） |\n| 权重精度 | **FP4 + FP8 混合**（原生已量化） |\n| 分片数 | 46 个 safetensors 文件 |\n| 磁盘总大小 | ~159 GB |\n| 架构名称 | `deepseek_v4`（自定义架构，非标准 Llama） |\n| 许可证 | MIT |\n\n**配置文件关键字段**（`config.json`）：\n\n```json\n{\n  \"model_type\": \"deepseek_v4\",\n  \"expert_dtype\": \"fp4\",           // MoE 专家权重是原生的 4-bit\n  \"quantization_config\": {\n    \"quant_method\": \"fp8\",          // 其余权重是 FP8\n    \"weight_block_size\": [128, 128]\n  },\n  \"num_hidden_layers\": 43,\n  \"hidden_size\": 4096,\n  \"num_attention_heads\": 64,\n  \"num_key_value_heads\": 1,       // MLA (Multi-head Latent Attention)\n  \"head_dim\": 512,\n  \"n_routed_experts\": 256,\n  \"num_experts_per_tok\": 6,\n  \"max_position_embeddings\": 1048576  // 1M tokens\n}\n```\n\n---\n\n## 二、这个模型特殊在哪\n\n和普通模型（Qwen、Llama）比，DeepSeek-V4-Flash 有几个关键差异：\n\n### ① 模型已经是原生量化的\n\n大多数开源模型以 FP16/BF16 精度发布，需要你自己做 AWQ/GPTQ 量化才能节约显存。\n\n**但这个模型不一样**——DeepSeek 发布时就已经是 FP4 + FP8 混合精度：\n- **MoE 专家参数**：FP4（4-bit 浮点）\n- **其他参数**：FP8（8-bit 浮点）\n\n这意味着你**不需要**再做额外的量化步骤（不需要 AutoAWQ，不需要 GPTQ）。\n\n### ② 它是 MoE 架构\n\n```\n输入 token\n    │\n    ▼\n┌──────────┐\n│ Router    │  ← 决定这个 token 应该分配给哪 6 个专家\n│ (门控网络) │\n└────┬─────┘\n     │\n     ▼\n  ┌──┴──┐  ┌──┴──┐  ┌──┴──┐      ┌──┴──┐\n  │专家1│  │专家2│  │专家3│  ...  │专家6│  ← 只激活 6/256 个专家\n  └──┬──┘  └──┬──┘  └──┬──┘      └──┬──┘\n     └────────┴────────┴────────────┘\n                    │\n                    ▼\n              输出合并\n```\n\n核心优势：**总参数量 284B，但每次只激活 13B**。也就是说，它的推理计算量大约相当于一个 13B 的 dense 模型，但模型容量（记忆的知识）相当于 284B。\n\n**对部署的影响**：\n- 显存占用主要由 284B 总参数决定（虽然计算量小，但所有专家的权重都得加载到显存）\n- 因为是 FP4/FP8 混合，实际显存约 ~80-100GB（而不是 284B × FP16 的 ~568GB）\n- 推理速度 ≈ 13B dense 模型\n\n### ③ 它使用 MLA（Multi-head Latent Attention）\n\nDeepSeek-V4 没有用标准的 Multi-Head Attention，而是用自己的 MLA：\n- `num_key_value_heads = 1`（只有一个 KV head）\n- `head_dim = 512`（每个 head 的维度很大）\n- 通过低秩投影（`q_lora_rank`, `o_lora_rank`）压缩 KV Cache\n\n**对部署的影响**：MLA 的 KV Cache 比标准 MHA 小得多，这对 1M 长上下文场景非常关键。但 vLLM 需要专门支持这种注意力机制。\n\n### ④ 它还有 CSA/HCA 混合注意力架构\n\nDeepSeek-V4 引入了：\n- **CSA**（Compressed Sparse Attention）：压缩稀疏注意力\n- **HCA**（Heavily Compressed Attention）：重度压缩注意力\n\n在 1M 上下文下，相比标准注意力只需要 27% 的 FLOPs 和 10% 的 KV Cache。\n\n---\n\n## 三、vLLM 对 DeepSeek-V4 的支持现状\n\n### 当前状态（截至 2026 年 6 月）\n\nvLLM 正在积极开发 DeepSeek-V4 支持，**已有初步支持但尚未完全稳定**：\n\n| 功能 | 状态 |\n|------|------|\n| 基础推理（MegaMoE + FP4 Indexer） | ✅ 已完成（PR #40860） |\n| FP4 权重加载 | ✅ 已完成 |\n| FP8 group quantization kernel | ✅ 已完成 |\n| Norm + Router 融合 | ✅ 已完成 |\n| Multi-stream 4 GEMM | ✅ 已完成 |\n| Nvlink all-to-all BF16/FP8 | ✅ 已完成 |\n| Fast topk kernel | ❌ 开发中 |\n| Indexer topk + page table fusion | ❌ 开发中 |\n| Pipeline parallelism | ❌ 开发中 |\n| KV cache offloading | ❌ 开发中 |\n| MTP（Multi-Token Prediction）优化 | ❌ 开发中 |\n\n### 你需要用哪个版本的 vLLM\n\n**建议使用最新版 vLLM（\u003e= v0.11.0 或更新的 nightly）**，或者用官方 Docker 镜像的最新 tag。\n\n如果官方镜像还不支持，可能需要：\n1. 从 vLLM 源码的 main 分支 build Docker 镜像\n2. 或者使用 DeepSeek 自己提供的推理栈（如果官方 vLLM 还不稳定）\n\n```bash\n# 从源码构建（包含最新 DeepSeek-V4 支持）\ngit clone https://github.com/vllm-project/vllm.git\ncd vllm\ndocker build -t vllm-dsv4 .\ndocker save vllm-dsv4 -o vllm-dsv4.tar\n```\n\n---\n\n## 四、部署流程\n\n### 准备工作\n\n| 需要准备的 | 说明 | 大小预估 |\n|-----------|------|---------|\n| vLLM Docker 镜像 | 需支持 deepseek_v4 架构 | ~15GB |\n| 模型文件（46 个分片） | 从 ModelScope 下载 | ~159GB |\n| 足够显存的 GPU | 见下方显存估算 | — |\n\n### 显存估算\n\n```\nDeepSeek-V4-Flash 284B params, FP4+FP8 mixed (~0.5-1 byte/param avg)\n\n模型权重 ≈ 159GB（磁盘大小就是权重大小）\nKV Cache（1M 上下文）≈ MLA 压缩后约 10-30GB\n中间激活 + 开销 ≈ 5-10GB\n\n总显存需求 ≈ 180-200GB（1M 上下文）\n              ≈ 80-100GB（32K 上下文）\n\n推荐配置：\n  · 8 × A100 80GB（1M 上下文）\n  · 2 × A100 80GB（32K 上下文）\n  · 4 × RTX 6000 48GB（32K 上下文）\n```\n\n### 具体步骤\n\n**有网环境**：\n\n```bash\n# 1. 下载模型\npip install modelscope\npython3 -c \"\nfrom modelscope import snapshot_download\nsnapshot_download('deepseek-ai/DeepSeek-V4-Flash', local_dir='./DeepSeek-V4-Flash')\n\"\n# 下载后得到 46 个分片文件\n\n# 2. 准备 vLLM 镜像（建议用最新版，或从源码 build）\n# 方案 A：用官方最新\ndocker pull vllm/vllm-openai:latest\ndocker save vllm/vllm-openai:latest -o vllm.tar\n\n# 方案 B：如果官方版不支持，从 main 分支 build\ngit clone https://github.com/vllm-project/vllm.git\ncd vllm\ndocker build -t vllm-dsv4 .\ndocker save vllm-dsv4 -o vllm-dsv4.tar\n\n# 3. 把镜像 + 模型传到内网\n```\n\n**内网环境**：\n\n```bash\n# 4. 导入镜像\ndocker load \u003c vllm-dsv4.tar\n\n# 5. 启动 vLLM 服务\ndocker run -d \\\n  --gpus all \\\n  --network host \\\n  --shm-size 64g \\\n  -v /data/DeepSeek-V4-Flash:/model \\\n  --name dsv4-service \\\n  vllm-dsv4:latest \\\n  --model /model \\\n  --served-model-name deepseek-v4-flash \\\n  --tensor-parallel-size 8 \\        # 用 8 张 GPU\n  --max-model-len 32768 \\            # 先用 32K 上下文测试\n  --gpu-memory-utilization 0.9 \\\n  --port 8000 \\\n  --trust-remote-code\n\n# 6. 验证\ncurl http://localhost:8000/v1/chat/completions \\\n  -H \"Content-Type: application/json\" \\\n  -d '{\"model\": \"deepseek-v4-flash\", \"messages\": [{\"role\": \"user\", \"content\": \"你好\"}]}'\n```\n\n### 关键参数说明\n\n| 参数 | 建议值 | 说明 |\n|------|--------|------|\n| `--tensor-parallel-size` | GPU 数量 | 张量并行，每张卡分摊一部分专家和注意力计算 |\n| `--max-model-len` | 32768（调试）→ 1048576（生产） | 上下文越长，KV Cache 越占显存 |\n| `--gpu-memory-utilization` | 0.9 | 留 10% 给中间计算 |\n| `--shm-size` | 64g 或更高 | MoE 的 all-to-all 通信需要大量共享内存 |\n| `--trust-remote-code` | 必须加 | DeepSeek-V4 的 config 里有自定义代码 |\n\n---\n\n## 五、显存不足怎么办？\n\n### MoE 模型的特殊性\n\nDeepSeek-V4-Flash 284B 权重全部要加载到显存。vLLM 用 `--tensor-parallel-size` 把权重切到多张卡上。\n\n| GPU 配置 | 能否跑 32K 上下文 | 能否跑 1M 上下文 |\n|----------|-----------------|-----------------|\n| 1 × A100 80GB | ❌ 显存不够 | ❌ |\n| 4 × A100 80GB | ✅ 可以 | ❌ |\n| 8 × A100 80GB | ✅ | ✅ 勉强 |\n| 8 × H100 80GB | ✅ | ✅ 较好 |\n\n### 实在不够怎么办？\n\n1. **减短 max-model-len**：上下文减半，KV Cache 减半\n2. **增加 tensor-parallel-size**：用更多小显存卡分摊\n3. **pipeline-parallel-size**：多机流水线并行，适合多台 4-GPU 服务器\n4. **等 vLLM 的 KV cache offloading 功能完成**（路线图中）：把不常用的 KV Cache offload 到 CPU 内存\n\n---\n\n## 六、和普通模型部署的关键区别\n\n| | 普通模型（Qwen/Llama） | DeepSeek-V4-Flash |\n|--|----------------------|-------------------|\n| 是否需要量化 | 需要（AWQ/GPTQ） | **不需要**，已是 FP4+FP8 |\n| 架构 | Dense Transformer | MoE + MLA + CSA/HCA |\n| vLLM 支持 | 稳定 | 开发中，需最新版 |\n| 总参/激活参 | 相同 | 284B / 13B（巨大差异） |\n| 显存瓶颈 | 计算量 | 模型权重加载（所有专家都要加载） |\n| 推理速度 | 与总参数成正比 | 与激活参数成正比（≈13B 模型速度） |\n| 上下文能力 | 通常 128K | 原生 1M |\n\n---\n\n## 七、参考链接\n\n- DeepSeek-V4 技术报告: https://huggingface.co/deepseek-ai/DeepSeek-V4-Pro/blob/main/DeepSeek_V4.pdf\n- HuggingFace 模型页: https://huggingface.co/deepseek-ai/DeepSeek-V4-Flash\n- ModelScope 地址: https://modelscope.cn/models/deepseek-ai/DeepSeek-V4-Flash\n- vLLM DeepSeek-V4 Roadmap: https://github.com/vllm-project/vllm/issues/40902\n- vLLM GitHub: https://github.com/vllm-project/vllm\n"])</script><script>self.__next_f.push([1,"13:T250e,"])</script><script>self.__next_f.push([1,"\n# ModelScope 权重分片 → 内网 vLLM 部署完整流程\n\n## 一、核心链路\n\n从 ModelScope 下载的权重分片，到最后能在内网用 vLLM 提供服务，中间需要经过的环节：\n\n```\n阶段一：有网环境（开发/构建机）\n───────────────────────────────────────────\n ① 下载模型分片（ModelScope）\n         ↓\n ② 量化模型（AWQ）—— 可选，但建议做\n         ↓\n ③ 准备 vLLM Docker 镜像\n         ↓\n ④ 打包导出（镜像 + 模型文件）\n         ↓\n  ┌──────────────────┐\n  │ 物理搬运到内网    │  ← 刻盘 / scp / 硬盘拷贝\n  └──────────────────┘\n\n阶段二：内网环境（生产服务器）\n───────────────────────────────────────────\n ⑤ Docker 导入镜像\n         ↓\n ⑥ 挂载模型文件 + 启动容器\n         ↓\n ⑦ API 服务可用\n```\n\n---\n\n## 二、阶段一：有网环境——把所有东西准备好\n\n### ① 下载模型分片\n\n用 ModelScope 的 Python SDK：\n\n```bash\npip install modelscope\n\npython3 -c \"\nfrom modelscope import snapshot_download\n# 这会下载到当前目录下的 Qwen2.5-72B/ 文件夹\nsnapshot_download('Qwen/Qwen2.5-72B-Instruct', local_dir='./Qwen2.5-72B')\n\"\n```\n\n下载后的目录结构：\n\n```\nQwen2.5-72B/\n├── config.json                 ← 模型配置\n├── tokenizer.json              ← 分词器\n├── model-00001-of-00060.safetensors\n├── model-00002-of-00060.safetensors\n├── ...                    ← 60 个分片文件\n├── model-00060-of-00060.safetensors\n└── model.safetensors.index.json  ← 索引：记录每个张量在哪个分片里\n```\n\n这就是你从 ModelScope 拿到的东西——**多个权重分片 + 索引文件**。vLLM 可以直接读这种目录。\n\n### ② 量化模型（AWQ）\n\n**为什么要量化？**\n\n70B 模型用 FP16（原始精度）需要约 140GB 显存——至少 2 张 A100（80GB）才能跑。量化到 INT4 后只需要约 40GB，**一张卡就够了**，推理速度还更快。\n\n```\n量化原理（一句话）：\n  每个权重本来用 16-bit 浮点数存（-65504 ~ 65504 范围）\n  量化后只用 4-bit 整数存（0 ~ 15 范围）\n  用一个 scale 系数来映射：float_val = int_val × scale\n  体积从 2 字节/参数 → 0.5 字节/参数，缩到 1/4\n```\n\n**实际操作**（用 AutoAWQ）：\n\n```bash\n# 安装\npip install autoawq\n\n# 量化\npython3 \u003c\u003c 'EOF'\nfrom awq import AutoAWQForCausalLM\nfrom transformers import AutoTokenizer\n\nmodel_dir = './Qwen2.5-72B'\noutput_dir = './Qwen2.5-72B-AWQ'\n\nmodel = AutoAWQForCausalLM.from_pretrained(\n    model_dir, device_map='auto'\n)\ntokenizer = AutoTokenizer.from_pretrained(model_dir)\n\nquant_config = {\n    'zero_point': True,\n    'q_group_size': 128,\n    'w_bit': 4,         # 4-bit 量化\n    'version': 'GEMM'\n}\n\nmodel.quantize(tokenizer, quant_config=quant_config)\nmodel.save_quantized(output_dir)\ntokenizer.save_pretrained(output_dir)\nEOF\n```\n\n量化后的目录结构和原来一样——仍然是多个 `.safetensors` 分片文件 + `index.json`。区别是每个分片文件的大小只有原来的约 1/4。**vLLM 加载时加上 `--quantization awq` 参数即可。**\n\n**什么时候可以跳过量化？**\n- 你的 GPU 显存总和 \u003e 模型大小 × 2（比如 70B 模型用 4 × A100 80GB，总显存 320GB \u003e\u003e 140GB）\n- 或只是做小模型（7B/14B 以下）\n\n### ③ 准备 vLLM Docker 镜像\n\n内网没有外网，所以需要先在能联网的机器上把 vLLM 的 Docker 镜像拉下来，打包带走。\n\n```bash\n# 拉取官方镜像（带 OpenAI 兼容 API）\ndocker pull vllm/vllm-openai:latest\n\n# 查看确认\ndocker images | grep vllm\n\n# 导出为 tar 包\ndocker save vllm/vllm-openai:latest -o vllm-openai.tar\n```\n\n镜像大约 10-20GB（包含 CUDA、PyTorch、vLLM 等完整环境）。\n\n**进阶：如果想把模型也打到镜像里**（相当于一个包含了环境和模型的完整部署包）：\n\n```dockerfile\n# Dockerfile\nFROM vllm/vllm-openai:latest\n\n# 把量化后的模型整个目录复制进去\nCOPY ./Qwen2.5-72B-AWQ /models/Qwen2.5-72B\n\n# 默认启动命令（运行时可以覆盖）\nCMD [\"--model\", \"/models/Qwen2.5-72B\", \"--port\", \"8000\"]\n```\n\n```bash\ndocker build -t vllm-full-package .\ndocker save vllm-full-package -o vllm-full-package.tar\n```\n\n**注意**：模型打包进镜像后 tar 文件会很大（40-150GB），传起来慢。更常见的做法是**模型单独传**，Docker run 时用 `-v` 挂载进去。\n\n### ④ 打包传输\n\n需要传到内网的材料：\n\n| 材料 | 大小（70B 模型为例） | 说明 |\n|------|-------------------|------|\n| `vllm-openai.tar` | ~15GB | Docker 镜像 |\n| `Qwen2.5-72B-AWQ/` 目录 | ~40GB | 量化后模型分片 |\n| 启动脚本 | 几 KB | 参数写好在文件里，免得出错 |\n\n**传输方式**：\n- 内网 scp / rsync（如果内网有入口机）\n- 硬盘/U 盘物理拷贝（物理隔离场景）\n- 刻录光盘（极端场景）\n\n---\n\n## 三、阶段二：内网环境——部署启动\n\n### ⑤ 导入 Docker 镜像\n\n```bash\n# 确认服务器有 NVIDIA 驱动 + Docker\nnvidia-smi\ndocker info\n\n# 导入 vLLM 镜像\ndocker load \u003c vllm-openai.tar\n\n# 确认\ndocker images\n# 应该看到 vllm/vllm-openai\n```\n\n### ⑥ 启动 vLLM 容器\n\n```bash\ndocker run -d \\\n  --gpus all \\\n  --network host \\\n  --shm-size 32g \\\n  -v /data/models/Qwen2.5-72B-AWQ:/model \\\n  --name vllm-service \\\n  vllm/vllm-openai:latest \\\n  --model /model \\\n  --served-model-name my-qwen \\\n  --tensor-parallel-size 4 \\\n  --quantization awq \\\n  --dtype auto \\\n  --max-model-len 8192 \\\n  --gpu-memory-utilization 0.9 \\\n  --port 8000 \\\n  --trust-remote-code\n```\n\n**参数详解（内网部署必调）：**\n\n| 参数 | 含义 | 你在内网怎么设 |\n|------|------|---------------|\n| `--tensor-parallel-size` | 用几张 GPU 并行处理一层 | = 这台机器上的 GPU 数量 |\n| `--quantization awq` | 告诉 vLLM 加载的是 AWQ 量化权重 | 如果你量化了就加，没量化不加 |\n| `--gpu-memory-utilization` | 显存用到多少百分比 | 0.9 留 10% 给其他开销 |\n| `--max-model-len` | 最大上下文长度 | 根据你的显存量调，越长越吃显存 |\n| `--shm-size` | 容器共享内存 | 大模型推荐 32GB 以上 |\n\n### ⑦ 验证\n\n```bash\n# 查看启动日志\ndocker logs -f vllm-service\n# 看到 \"Uvicorn running on http://0.0.0.0:8000\" 表示 OK\n\n# 测试 API\ncurl http://localhost:8000/v1/chat/completions \\\n  -H \"Content-Type: application/json\" \\\n  -d '{\n    \"model\": \"my-qwen\",\n    \"messages\": [{\"role\": \"user\", \"content\": \"你好\"}],\n    \"max_tokens\": 100\n  }'\n\n# 应该返回带 choices 的 JSON\n```\n\n---\n\n## 四、如果一台机器放不下——多机分布式\n\n当单机显存总量不够跑完整模型时，用多台服务器拼起来。\n\n```\n服务器 A (head)       服务器 B (worker)      服务器 C (worker)\n   ├── GPU 0-3           ├── GPU 0-3           ├── GPU 0-3\n   │                     │                     │\n   └─────────── 内网互联（NCCL/RoCE）───────────┘\n                        │\n                    vLLM 把模型层切到所有 GPU 上\n```\n\n每台机器都需要：vLLM 镜像 + 模型文件。\n\n```bash\n# 所有机器启动 Ray 集群通信\n# head 节点（假设 IP 192.168.1.1）：\ndocker run --gpus all --network host --shm-size 32g \\\n  -v /data/models/Qwen2.5-72B:/model \\\n  vllm/vllm-openai:latest \\\n  ray start --head --port=6379\n\n# 其他 worker 节点：\ndocker run --gpus all --network host --shm-size 32g \\\n  -v /data/models/Qwen2.5-72B:/model \\\n  vllm/vllm-openai:latest \\\n  ray start --address=192.168.1.1:6379\n\n# 进入 head 容器，启动 vLLM：\ndocker exec -it \u003chead容器ID\u003e /bin/bash\nvllm serve /model \\\n  --tensor-parallel-size 4 \\      # 每台机器 4 张卡\n  --pipeline-parallel-size 3 \\    # 3 台机器流水线并行\n  --dtype auto\n```\n\n---\n\n## 五、各步骤的时间预估\n\n| 步骤 | 耗时 | 说明 |\n|------|------|------|\n| 下载模型（70B） | 30-60 分钟 | 取决于带宽，ModelScope 国内较快 |\n| AWQ 量化（70B） | 1-3 小时 | 需要 GPU，最耗时的步骤 |\n| docker pull vLLM | 5-10 分钟 | 镜像 ~10GB |\n| docker save + 传输 | 20-60 分钟 | 取决于传输方式 |\n| docker load | 5-10 分钟 | |\n| 首次启动 vLLM | 2-10 分钟 | 需要编译 CUDA kernel 缓存 |\n\n---\n\n## 六、常见问题\n\n**Q：内网机器没有网络，pip install 怎么办？**\nA：不需要 pip。用 Docker 镜像，所有依赖都在镜像里。你只需要 `docker load \u003c tar`。\n\n**Q：模型文件一定要量化吗？**\nA：不一定。看你的 GPU 总显存够不够。70B 模型 FP16 需要 ~140GB，INT4 需要 ~40GB。显存够就不用量化。\n\n**Q：量化会损失多少质量？**\nA：AWQ 4-bit 量化在 MMLU 等基准测试上通常损失 \u003c 1-2%，对于大多数对话/生成场景几乎不可感知。\n\n**Q：多个分片文件怎么给 vLLM？**\nA：直接把分片文件所在目录路径传给 `--model` 参数，vLLM 会自动读 `index.json` 找到所有分片。不需要任何额外操作。\n\n**Q：为什么 shm-size 设 32GB？**\nA：vLLM 的多进程通信（tokenizer、调度器、GPU worker 之间）需要共享内存。不够会报 `bus error`。\n"])</script><script>self.__next_f.push([1,"14:T20e2,"])</script><script>self.__next_f.push([1,"\n# 智能体开发基础知识与模型量化指南\n\n## 一、大模型量化 — 常见后缀/格式全解\n\n### 为什么需要量化？\n\n默认模型权重用 BF16/FP16（每个参数 2 字节）。70B 模型 BF16 需要 **140GB 显存**。量化降低精度来压缩体积：\n\n| 格式 | 每参数大小 | 相对于 BF16 | 70B 模型显存 |\n|------|-----------|-------------|-------------|\n| FP32 | 4 字节 | 2x（更大） | 280GB |\n| BF16/FP16 | 2 字节 | 1x（基准） | 140GB |\n| FP8 | 1 字节 | 节省 50% | ~70GB |\n| INT8 | 1 字节 | 节省 50% | ~70GB |\n| INT4 | 0.5 字节 | 节省 75% | ~35-40GB |\n\n### 常见后缀逐一解释\n\n#### 精度后缀\n\n| 后缀 | 全称 | 说明 |\n|------|------|------|\n| **fp16** / **bf16** | Floating Point 16 / Brain Float 16 | 标准推理精度，无质量损失。BF16 是现代 GPU 原生支持的格式 |\n| **fp8** | Floating Point 8 | 1 字节浮点，H100/H200 等 Blackwell/Hopper 架构原生支持。质量接近 BF16（保留 ~99%），是 2026 年生产环境的性价比首选 |\n| **int8** | Integer 8 | 8 位整数，广泛兼容。质量约 BF16 的 97-98%。bitsandbytes 库支持 |\n| **int4** | Integer 4 | 4 位整数，极致压缩。质量约 BF16 的 93-96%，复杂推理任务下降较明显 |\n| **nf4** | Normalized Float 4 | QLoRA 微调专用的 4 位格式，信息论最优。不用作推理部署 |\n\n#### 量化方法后缀（重要！）\n\n| 后缀 | 全称 | 核心原理 | 适用场景 |\n|------|------|---------|---------|\n| **AWQ** | Activation-Aware Weight Quantization | 分析激活模式，识别重要权重并保护它们，不重要的量化更狠 | **INT4 最佳方案**，vLLM 部署首选，质量保留 ~94-96% |\n| **GPTQ** | Generative Pre-Training Quantization | 逐层量化，利用二阶信息（Hessian 矩阵）最小化误差 | 较早的 INT4 方案，工具支持广泛。质量略低于 AWQ |\n| **GGUF** | GPT-Generated Unified Format | llama.cpp/Ollama 的容器格式。支持混合精度（k-quants），可 CPU+GPU 协同推理 | **本地开发/Ollama 首选**，消费级显卡友好 |\n| **HQQ** | Half-Quadratic Quantization | 无需校准数据，解析求解量化问题。几分钟完成 70B 量化 | 快速原型验证，新模型发布当天即可量化 |\n| **SmoothQuant** | — | 平滑激活值异常值，使 INT8 推理更准确 | 数据中心 INT8 部署 |\n\n#### GGUF 内部的 k-quant 变体（常见后缀组合）\n\n| 后缀 | 说明 | 质量 vs BF16 |\n|------|------|-------------|\n| q2_k | 2 位混合，极致压缩 | ~80-85%（明显降质） |\n| q3_k | 3 位混合 | ~85-90% |\n| q4_k_m | **最常用的 4 位平衡点** | ~92-94% |\n| q5_k_m | 5 位高质量 | ~95-97% |\n| q6_k | 6 位，接近无损 | ~97-98% |\n| q8_0 | 8 位，几乎无损 | ~99% |\n\n### 硬件的选择策略\n\n| 硬件 | 推荐格式 |\n|------|---------|\n| H100/H200 (Hopper) 或 RTX PRO 6000 (Blackwell) 96GB | FP8（质量最高）或 AWQ INT4（70B 单卡） |\n| RTX 5090 32GB | AWQ INT4 跑 13-30B，GGUF Q4_K_M |\n| 消费级 24GB | GGUF Q4_K_M / Q5_K_M 跑 13B |\n| CPU only / Mac Apple Silicon | GGUF（原生 Metal 加速） |\n\n### 一句话选型口诀\n\n\u003e **有 H100 用 FP8，显存不够用 AWQ，本地 Mac 用 GGUF，微调用 NF4。**\n\n---\n\n## 二、智能体 (AI Agent) 开发核心概念\n\n### 什么是 AI Agent？\n\nAI Agent 是能自主感知环境、做出决策、执行动作的智能系统。不同于单轮问答，Agent 能：\n- **规划**：将复杂任务分解为多步\n- **工具调用**：使用外部工具（搜索、代码执行、文件操作）\n- **记忆**：记住对话历史和中间状态\n- **反思**：根据结果自我修正\n\n### Agent 核心架构（2026 主流）\n\n```\n用户请求\n    │\n    ▼\n┌─────────────┐\n│   Orchestrator  │  ← 主控/调度器\n│  (规划、调度)    │\n└──────┬──────┘\n       │\n   ┌───┼───┬───┬───┐\n   ▼   ▼   ▼   ▼   ▼\n  LLM 搜索 代码 文件 数据库\n (推理) (工具) (工具) (工具) (记忆)\n```\n\n### 主流的 Agent 模式\n\n**1. ReAct (Reasoning + Acting)**\n最经典的范式：思考 → 行动 → 观察 → 再思考\n```\nThought: 我需要搜索今天的天气\nAction: 调用 search_weather()\nObservation: 晴天，25°C\nThought: 天气不错，建议用户出门\nAnswer: 今天天气很好，适合出去走走\n```\n\n**2. Function Calling**\n模型输出结构化 JSON 调用预定义函数，由框架执行并返回结果。\n\n**3. 多 Agent 协作 (Multi-Agent)**\n多个 Agent 各司其职，通过消息传递协作：\n- Supervisor Agent：分配任务、汇总结果\n- Worker Agent：执行具体子任务\n- Critic Agent：审核/检查质量\n\n**4. MCP (Model Context Protocol)**\n2025-2026 年兴起的新标准协议，让 LLM 和外部工具/数据源通过标准化接口交互。Anthropic 提出，类似 USB 标准——一次接入，到处使用。\n\n### 主流 Agent 开发框架\n\n| 框架 | 定位 | 特点 |\n|------|------|------|\n| **LangGraph** | 复杂 Agent 工作流 | 有向图编排、状态持久化、人机交互循环。最灵活的底层框架 |\n| **CrewAI** | 多 Agent 协作 | 角色定义明确（Manager + Worker），适合清晰的团队分工场景 |\n| **AutoGen** (Microsoft) | 多 Agent 对话 | 强调 Agent 间自由对话协商，适合复杂问题分解 |\n| **Semantic Kernel** | 企业级 | 微软出品，C#/Python，与 Azure/Azure DevOps 深度集成 |\n| **Dify** | 低代码 | 可视化编排，适合快速原型和业务人员使用 |\n| **Coze** (字节) | 低代码/中文友好 | 国内生态，插件市场丰富 |\n| **OpenAI Agents SDK** | 轻量/官方 | 2026 年新推出，适合简单场景 |\n\n### Agent 开发常见八股题\n\n**Q: Agent 的\"记忆\"如何实现？**\nA: 分三层：(1) 短期记忆 = 当前对话上下文窗口 (2) 长期记忆 = 向量数据库存储的嵌入历史 (3) 工作记忆 = 多步推理中的中间状态（通常用 Buffer 或 Graph State 管理）\n\n**Q: Tool Calling 和 Function Calling 有什么区别？**\nA: Function Calling 特指模型输出结构化参数（OpenAI API 格式），Tool Calling 是更宽泛的概念，包括 Function Calling、MCP 工具、自定义 API 等多种形式。\n\n**Q: Agent 如何避免无限循环？**\nA: (1) 最大迭代次数截断 (2) 重复检测（相同工具+相同参数） (3) 带超时的终止条件 (4) 人类介入循环 (Human-in-the-loop)\n\n**Q: 什么是 RAG + Agent 的区别？**\nA: RAG = 检索增强生成，解决知识实时性问题（查资料再回答）。Agent = 能执行动作的自主系统。两者常结合——Agent 用 RAG 作为记忆/知识来源。\n\n**Q: 多 Agent 和单 Agent 调度有什么区别？**\nA: 单 Agent 自己规划+执行+检查。多 Agent 将规划/执行/检查分开，每个 Agent 各司其职，适合复杂任务但增加通信开销。\n\n### 2026 年 Agent 开发趋势\n\n- **Agentic AI → 生产部署**：2026 年 Agent 从演示进入真正生产\n- **Multi-Agent 是最热门技能**：企业 Agent 需求最大的方向\n- **MCP 协议标准化**：工具/数据接入从定制化走向标准化\n- **Agent 安全成为焦点**：Prompt 注入、多步劫持、权限管控\n- **Windows Agent Framework**：微软在 Build 2026 推出的 OS 级 Agent 平台\n\n---\n\n## 三、模型部署与推理必知\n\n| 工具 | 说明 | 适用场景 |\n|------|------|---------|\n| **vLLM** | 高性能推理引擎，支持 PagedAttention 提升吞吐 | 生产环境多用户 API 服务 |\n| **SGLang** | 结构化生成语言，约束解码 | 需要结构化输出（JSON Schema）的场景 |\n| **llama.cpp** / **Ollama** | CPU+GPU 混合推理 | 本地开发、Mac 用户、消费级显卡 |\n| **TensorRT-LLM** | NVIDIA 官方优化引擎 | H100 等高端 GPU 极致性能 |\n| **TGI** (HF) | Hugging Face 推理引擎 | 快速部署 HF 模型 |\n\n---\n\n## 四、相关资源\n\n### 量化工具\n- AWQ: https://github.com/mit-han-lab/llm-awq\n- AutoGPTQ: https://github.com/AutoGPTQ/AutoGPTQ\n- llama.cpp: https://github.com/ggerganov/llama.cpp\n- bitsandbytes: https://github.com/bitsandbytes-foundation/bitsandbytes\n\n### 参考文章\n- LLM Quantization Explained (VRLA Tech): https://vrlatech.com/llm-quantization-explained-int4-int8-fp8-awq-and-gptq-in-2026/\n- LLM Quantization Guide (ResumeLens): https://www.resumelens.org/blog/ai/llm-quantization-guide\n"])</script><script>self.__next_f.push([1,"15:T3c33,"])</script><script>self.__next_f.push([1,"\n# Agent Skill 设计方案：LLM 驱动的 Markdown→DOCX 转换\n\n## 核心思想\n\n**不是写转换代码，是给大模型造一套\"手艺工具\"。**\n\n传统路线：\n```\n程序员写转换逻辑 → 编译成 CLI → 用户调用\n```\n\nAgent Skill 路线：\n```\nSkill 提供工具原语 → LLM 理解模板意图 → LLM 编排流程 → 生成 DOCX\n```\n\n**LLM 是设计师和工匠，工具只是它的手。**\n\n---\n\n## 设计原则\n\n1. **LLM 做决策，工具做执行** — 凡是需要理解、判断、映射的事交给 LLM，凡是机械操作交给工具\n2. **模板是 LLM 的\"设计语言\"** — LLM 需要能\"看懂\"模板里有什么样式，才能做出好的映射决策\n3. **映射决策由 LLM 推理产生** — 而不是硬编码在 config 里\n4. **可观察性** — LLM 的每一步决策（为什么这个 markdown 元素映射到那个样式）应该能 trace\n\n---\n\n## 方案 A：工具组合模式（Hermes 原生风格）\n\nSkill 提供一组**原子工具**，LLM 编排组合。\n\n```\n┌──────────────────────────────────────────────────┐\n│                    Agent (LLM)                     │\n│  ┌──────────┐  ┌──────────┐  ┌────────────────┐  │\n│  │ 理解模板  │→ │ 理解 MD  │→ │ 决定映射方案    │  │\n│  │ 的样式体系 │  │ 的结构   │  │  + 逐段渲染     │  │\n│  └────┬─────┘  └────┬─────┘  └───────┬────────┘  │\n└───────┼──────────────┼────────────────┼───────────┘\n        │              │                │\n        ▼              ▼                ▼\n┌──────────────────────────────────────────────────┐\n│                   Skill 工具层                     │\n│  ┌──────────────┐  ┌──────────┐  ┌────────────┐  │\n│  │template_     │  │md_parse  │  │docx_       │  │\n│  │analyze(path) │  │(path)    │  │render      │  │\n│  └──────────────┘  └──────────┘  │(md_ast,    │  │\n│                                  │ styles,    │  │\n│  ┌──────────────┐  ┌──────────┐  │ mapping,   │  │\n│  │style_mapping │  │docx_     │  │ template)  │  │\n│  │_suggest(...) │  │validate  │  └────────────┘  │\n│  └──────────────┘  └──────────┘                    │\n└──────────────────────────────────────────────────┘\n```\n\n### 工具清单（Hermes execute_code 可调用）\n\n```python\n# tool 1: 模板分析\ndef template_analyze(template_path: str) -\u003e dict:\n    \"\"\"读取 DOCX 模板，返回完整的样式目录\"\"\"\n    # 返回: 段落样式列表、字符样式列表、表格样式列表、页面设置\n    # 每个样式包括: 名称、类型、字体、字号、颜色、粗体/斜体等属性\n    # 以及 numbering definitions（列表编号定义）\n    pass\n\n# tool 2: Markdown 解析\ndef md_parse(md_path: str) -\u003e list:\n    \"\"\"解析 Markdown，返回结构化内容树\"\"\"\n    # 返回: [{type, level, text, spans: [{type, text}], children?}]\n    # 类型: heading, paragraph, list, table, codeblock, blockquote, image\n    # spans 类型: bold, italic, code, link, strikethrough, underline\n    pass\n\n# tool 3: 映射建议（LLM 辅助）\ndef style_mapping_suggest(template_styles: dict, md_structure: list, user_hints: str = \"\") -\u003e dict:\n    \"\"\"LLM 根据模板样式和 Markdown 结构，自动推荐最优映射\"\"\"\n    # 本质是一个 LLM 调用，分析样式名称/属性与 markdown 语义的匹配度\n    # 返回: {paragraph: {h1: \"Heading 1\", p: \"Normal\", ...},\n    #        inline: {bold: \"Strong Char\", code: \"Code Char\", ...}}\n    pass\n\n# tool 4: 核心渲染\ndef docx_render(md_ast: list, template_path: str, style_mapping: dict, output_path: str) -\u003e str:\n    \"\"\"执行渲染（纯机械操作，无智能判断）\"\"\"\n    # 用 python-docx 打开模板，遍历 md_ast\n    # 对每个元素: 查 style_mapping → 应用对应的段落/字符样式\n    # 不设任何 run.bold/italic 属性，只设 run.style\n    # 返回: 输出文件路径\n    pass\n\n# tool 5: 验证\ndef docx_validate(docx_path: str, md_ast: list) -\u003e dict:\n    \"\"\"验证输出 DOCX 的完整性和样式正确性\"\"\"\n    # 检查: 内容完整性、样式应用是否正确、占位符残留\n    pass\n\n# tool 6: 模板样式可视化预览\ndef template_preview(template_path: str) -\u003e str:\n    \"\"\"渲染一个\"样式示例\"文档，展示模板中每个样式的实际效果\"\"\"\n    # 生成一个 DOCX 或 HTML 预览，让用户/LLM 直观看到每个样式长什么样\n    # 这对于 LLM 做映射决策非常重要\n    pass\n```\n\n### Agent 工作流\n\n```\n用户: \"把这份 report.md 套上公司的 docx 模板生成报告\"\n\nAgent 内部推理链:\n\nStep 1 - 理解模板\n  template_analyze(\"template.docx\")\n  → 得到: [{name: \"Heading 1\", font: \"Microsoft YaHei\", size: 22, bold: true},\n           {name: \"Heading 2\", font: \"Microsoft YaHei\", size: 16, bold: true},\n           {name: \"Normal\", font: \"Microsoft YaHei\", size: 11},\n           {name: \"Quote Char\", type: \"character\", color: \"666666\", italic: true},\n           ...]\n\nStep 2 - 理解内容\n  md_parse(\"report.md\")\n  → 得到: [{type: \"heading\", level: 1, text: \"第一章\", ...},\n           {type: \"paragraph\", text: \"这是**重点**内容\", spans: [{text: \"重点\", type: \"bold\"}]},\n           ...]\n\nStep 3 - 推理映射方案\n  LLM 思考:\n  \"模板里有 Heading 1-3，markdown 有 H1-H3，直接映射。等等，模板的 Heading 1 是微软雅黑 22pt，\n  看起来是正式的文档标题风格，适合映射。模板的 Quote Char 是斜体灰色字符样式，可以用来做引用\n  块的正文... 代码块模板里没有专门的 Code Block 段落样式，但有一个叫 'Code' 的字符样式，\n  可以建一个段落加这个字符样式...\"\n\n  生成 style_mapping:\n  {\n    paragraph: {\n      h1: \"Heading 1\", h2: \"Heading 2\", h3: \"Heading 3\",\n      paragraph: \"Normal\", blockquote: \"Quote Body\",\n      code_block: \"Normal\",       # 段落用 Normal，靠字符样式区分\n      bullet_list: \"List Bullet\",\n      ordered_list: \"List Number\"\n    },\n    inline: {\n      bold: \"Strong Char\",\n      italic: \"Emphasis Char\",\n      code: \"Code Char\",\n      link: \"Hyperlink Char\",\n      strikethrough: \"Strikethrough Char\"\n    },\n    code_block_char: \"Code\"        # 代码块内全段用这个字符样式\n  }\n\nStep 4 - 执行渲染\n  docx_render(md_ast, \"template.docx\", style_mapping, \"output.docx\")\n  → \"output.docx\"\n\nStep 5 - 验证\n  docx_validate(\"output.docx\", md_ast)\n  → {complete: true, style_accuracy: 0.95, issues: [...]}\n\nStep 6 - 呈现给用户\n  \"已生成 output.docx。用了模板的 Heading 1-3 做标题层级，\n  代码块用 Normal 段落 + Code 字符样式保持格式一致。\n  唯一需要注意的是表格样式映射为 Table Grid，若需要自定义表头颜色可以调整映射。\"\n```\n\n### 优势\n\n- **完全透明** — LLM 的每一步映射决策都可读、可干预\n- **可适应任意模板** — LLM 基于模板的实际样式内容决策，不依赖预配置\n- **可处理边缘情况** — 遇到奇怪格式时，LLM 能推理出最佳处理方式\n- **逐步验证** — 每步可中断、可调整\n\n### 劣势\n\n- **多轮工具调用** — 完整流程大约 5-7 轮，token 消耗大\n- **延迟** — 每轮 LLM 推理 + 工具执行，总耗时 30 秒+\n- **LLM 可能犯错** — 映射决策质量取决于模型能力\n\n---\n\n## 方案 B：智能单步模式（务实版）\n\n工具简化为**一个高层次的 \"智能渲染器\"**，LLM 只做关键的决策输入。\n\n```\nskill 提供: docx_render_intelligent(md_path, template_path, output_path, user_hints)\n```\n\n内部实现：\n1. 自动解析模板（python-docx）\n2. 自动解析 MD（mistune）\n3. LLM 调用（内部）：\"根据这些模板样式和 Markdown 结构，生成最优映射\"\n4. 执行渲染（python-docx）\n5. 返回结果 + 映射说明\n\n**Agent 视角：**\n```\n用户: \"把 report.md 套模板生成报告\"\nAgent: 调用 docx_render_intelligent(\"report.md\", \"template.docx\", \"report.docx\")\n       → {\"status\": \"ok\", \"path\": \"report.docx\", \"mapping_used\": {...}, \"issues\": []}\n       \"已完成。模板映射详情：...\"\n```\n\n### 优势\n\n- **一次调用** — 快速、token 省\n- **LLM 在内部使用** — 利用大模型的智能但不暴露复杂度\n\n### 劣势\n\n- **不透明** — Agent 看不到内部映射过程，难以干预\n- **LLM 调用在工具内部** — 工具成了一个\"黑盒\"，失去了 Agent 编排的灵活度\n- **调试困难** — 映射错了不容易修正，得修工具代码\n\n---\n\n## 方案 C：两阶段模式 ⭐（推荐）\n\n结合 A 和 B 的优点，分两阶段：\n\n**阶段 1 — 设计（LLM 密集型）**\n```\nAgent: template_analyze() → 理解样式体系\nAgent: md_parse() → 理解内容结构\nAgent: LLM 推理 → 生成 style_mapping（可让用户确认）\n```\n**阶段 2 — 执行（工具密集型）**\n```\nAgent: docx_render(md_ast, template, mapping, output) → 一次生成\nAgent: docx_validate() → 质量检查\n```\n\n```\n用户: \"把 report.md 套模板生成报告\"\n\nAgent:\n  styles = template_analyze(\"template.docx\")\n  md_ast = md_parse(\"report.md\")\n  mapping = style_mapping_suggest(styles, md_ast)\n  # 可选：展示给用户确认\n  result = docx_render(md_ast, \"template.docx\", mapping, \"report.docx\")\n  report = docx_validate(\"report.docx\", md_ast)\n  → 呈现结果\n```\n\n---\n\n## Hermes Skill 具体实现\n\n作为 Hermes skill，结构应该是：\n\n```\n~/.hermes/skills/report-engine/\n├── SKILL.md                    # 技能描述 + 使用指引\n├── scripts/\n│   ├── template_analyze.py     # tool 1: 模板分析\n│   ├── md_parse.py             # tool 2: MD 解析\n│   ├── docx_render.py          # tool 3: 核心渲染\n│   ├── docx_validate.py        # tool 4: 验证\n│   └── docx_preview.py         # tool 5: 样式预览\n├── references/\n│   ├── style-mapping-guide.md  # 映射策略说明（LLM 参考）\n│   └── template-guide.md       # 模板制作指引\n└── templates/\n    └── default-reference.docx   # 内置默认模板\n```\n\n### SKILL.md 核心内容\n\n```markdown\n---\nname: report-engine\ndescription: \"将 Markdown 文档通过 DOCX 模板渲染为格式化文档。提供模板分析、样式映射、渲染和验证工具。Agent 应通过工具组合完成转换，LLM 负责映射决策，工具负责执行。\"\nversion: 1.0.0\nauthor: nemo\nlicense: MIT\nmetadata:\n  hermes:\n    tags: [docx, template, report, rendering, office]\n    related_skills: []\n---\n\n# Report Engine\n\n## 概述\n\n将 Markdown 内容套入 DOCX 模板，生成风格一致的正式文档。\n**模板是样式权威** — 所有内容样式由模板定义，StyleMapping 表决定映射关系。\n\n## 核心哲学\n\n| 谁 | 负责什么 |\n|----|---------|\n| **LLM (Agent)** | 理解模板样式体系、理解 MD 结构、推理映射方案、处理边缘情况 |\n| **工具 (Scripts)** | 模板分析、MD 解析、DOCX 渲染、质量验证 |\n\n## 工具使用指南\n\n### 1. template_analyze(template_path)\n\n读取 DOCX 模板，返回完整的样式目录。\n\n**返回结构：**\n```json\n{\n  \"paragraph_styles\": [\n    {\"name\": \"Heading 1\", \"font\": {\"name\": \"...\", \"size\": 22, \"bold\": true}, ...}\n  ],\n  \"character_styles\": [\n    {\"name\": \"Strong Char\", \"font\": {\"bold\": true, \"color\": \"000000\"}, ...}\n  ],\n  \"table_styles\": [\"Table Grid\", \"Light Shading\"],\n  \"page_setup\": {\"width\": 595, \"height\": 842, \"margin_top\": 72, ...},\n  \"numbering\": [\n    {\"name\": \"ListBullet\", \"format\": \"bullet\", \"symbol\": \"●\"},\n    {\"name\": \"ListNumber\", \"format\": \"decimal\", \"start\": 1}\n  ]\n}\n```\n\n### 2. md_parse(md_path)\n\n解析 Markdown 为结构化 AST。\n\n### 3. docx_render(md_ast, template_path, style_mapping, output_path)\n\n执行渲染。关键约束：\n- **段落**：`paragraph.style = doc.styles[mapping[\"paragraph\"][type]]`\n- **Run**：`run.style = doc.styles[mapping[\"inline\"][format]]`\n- **绝不直接设** `run.bold`、`run.italic`、`run.font.name` 等属性\n- 模板的样式定义是唯一来源\n\n### 4. docx_validate(docx_path, md_ast)\n\n验证输出质量。\n\n### 5. docx_preview(template_path)\n\n生成一个\"样式示例文档\"，让 LLM 直观看到每种样式的效果。\n```\n\n### Agent 调用示例（终端里看到的）\n\n```\n用户: \"把这篇 report.md 套公司模板转成 DOCX\"\n\nAgent 执行流程:\n  ╰─ 分析模板 ...\n  ╰─ 解析 Markdown ...\n  ╰─ 推理样式映射 ...\n      → H1 → Heading 1 (微软雅黑 22pt 粗体)\n      → H2 → Heading 2 (微软雅黑 16pt 粗体)\n      → **粗体** → Strong Char\n      → `代码` → Code Char\n  ╰─ 渲染 DOCX ...\n  ╰─ 验证输出 ...\n  ╰─ 完成\n\n已生成 /Users/nemo/report.docx\n映射方案:\n  ─────────────────────────────────\n  标题1 → Heading 1 (模板定义: 雅黑 22pt)\n  标题2 → Heading 2 (模板定义: 雅黑 16pt)\n  正文  → Normal (模板定义: 雅黑 10.5pt)\n  粗体  → Strong Char (模板定义: 粗体+主题色)\n  引用  → Quote Body 段落样式 + Quote Char 字符样式\n  代码  → Normal段落 + Code Char (Consolas 9pt)\n  ─────────────────────────────────\n  所有样式均从模板继承，内容不带硬编码格式。\n```\n\n---\n\n## 与 Kīlo 的兼容\n\nKīlo 等 agent CLI 也遵循类似的 tool-calling 范式。核心设计不变：\n- 提供可被 LLM 调用的工具函数\n- 工具函数是纯机械操作（无 AI 决策）\n- LLM 负责编排和决策\n\n如果 Kīlo 支持 MCP（Model Context Protocol），也可以把工具包装成 MCP server：\n\n```python\n# mcp_server.py\n@tool\ndef render_docx(md_path: str, template_path: str, style_mapping: dict = None) -\u003e str:\n    \"\"\"Render markdown to DOCX using template styles.\"\"\"\n    ...\n```\n\n---\n\n## 我推荐的做法\n\n**两阶段模式（方案 C）**，理由：\n\n1. LLM 做它擅长的事（理解、推理、映射）→ 阶段 1\n2. 工具做它擅长的事（快速机械执行）→ 阶段 2\n3. 用户可以干预映射方案（在阶段 1 结束后确认）\n4. 对比纯工具模式（方案 A）：少 3-5 轮调用，快很多\n5. 对比黑盒模式（方案 B）：映射决策透明，可调整\n\n**优先级：**\n1. 先写 `template_analyze.py` 和 `docx_render.py` 两个核心脚本（纯机械逻辑）\n2. 再写 `SKILL.md`，重点写 LLM 做映射决策的指引\n3. 最后写 `style_mapping_suggest` 作为可选辅助（LLM-in-the-loop optimization）\n"])</script><script>self.__next_f.push([1,"16:T33a8,"])</script><script>self.__next_f.push([1,"\n# 将 Markdown 套入 DOCX 模板的实现方案调研\n\n\u003e 背景：报告生成引擎项目需要将 Markdown 内容渲染为 DOCX，要求模板是**唯一样式权威**（template washes all styles），内容中的格式标记（粗体/斜体/代码）通过 StyleMapping 表映射为模板字符样式，而非直接设置 Run 属性。\n\n---\n\n## 一、现有生态盘点\n\n### 1.1 Pandoc + reference-doc — 最成熟的现有方案\n\n```\npandoc input.md -o output.docx --reference-doc=template.docx\n```\n\n**原理**：pandoc 从 `reference.docx` 复制样式定义（段落样式、字符样式、表格样式、页面设置），应用到生成的 DOCX 上。\n\n**能力矩阵：**\n\n| 特性 | 支持度 | 说明 |\n|------|--------|------|\n| 段落样式继承 | ✅ | Heading 1~6, Normal, Quote 等按名称匹配 |\n| 页面设置继承 | ✅ | 纸张大小、边距、页眉页脚等 |\n| 表格样式 | ⚠️ 有限 | 默认只认 `Table` 样式名；2025年后有改进但仍有坑 |\n| **字符样式映射** | ❌ | `**粗体**` 默认转 `run.bold=True`，**不**使用字符样式 |\n| **自定义样式名** | ❌ | 硬编码映射（Heading→Heading 1，Bold→run.bold），无法配置 |\n| **章节槽位/占位符** | ❌ | 没有内容到模板特定位置注入的能力 |\n\n**关键限制**：pandoc 的 inline 格式渲染是**属性级别的**（`run.bold=True`），不走字符样式。要让 `**text**` → `run.style = 'Strong Char'`，需要 Lua filter 拦截 AST，手动写 OpenXML。而且不支持模板中的自定义段落样式名映射。\n\n**Lua filter 拐杖方案：**\n```lua\n-- 拦截 Strong 元素，强制转为带有字符样式的 Span\nfunction Strong(elems)\n  -- 需要注入 OpenXML 的 run properties，极其复杂\n  return pandoc.Span(elems, {custom_style = \"Strong Char\"})\nend\n```\n不推荐——pandoc 的 Lua API 对 docx 字符样式的控制非常有限，且不同版本行为不一致。\n\n### 1.2 docxtpl（python-docx-template）— 模板引擎方案\n\n```\ndocxtpl 的思路：DOCX 里有 {{ variable }}，渲染时填入数据\n```\n\n**适合场景**：数据驱动的报告（如：{{ customer_name }}，{% for row in table %}），**不是 Markdown→DOCX**。\n\n**与需求差距**：\n- 需要人手工在 Word 里插入 Jinja2 标签\n- 不能直接吃 Markdown 文件\n- 格式标记需要预处理为 RichText 对象\n- 不解决\"模板是唯一样式权威\"问题\n\n### 1.3 python-docx + mistune — 纯手工方案（PRD 现状）\n\n```\nMarkdown → mistune(解析) → ReportModel → python-docx(渲染) → DOCX\n```\n\n**优势**：完全可控，StyleMapping 随心定义\n**劣势**：要处理所有边缘情况（嵌套列表、表格内格式、图片、公式等）\n\n---\n\n## 二、核心架构选择（三种路线）\n\n### 路线 A：Pandoc-centric（薄封装）\n\n```\nMarkdown → pandoc(解析+基础DOCX) → python-docx(后处理: 重写样式) → 最终DOCX\n```\n\n**流程：**\n1. `pandoc input.md -o temp.docx --reference-doc=template.docx`（先用模板出初稿）\n2. python-docx 打开 temp.docx，遍历所有段落和 run\n3. 对每个元素：查 StyleMapping 表，重新应用模板样式\n\n**优点：**\n- 利用 pandoc 的鲁棒解析能力（表格、代码块、公式、图片等）\n- 自己只需写\"样式后处理\"层，代码量最小\n- pandoc 处理了 95% 的 content→layout 转换\n\n**缺点：**\n- 两遍扫描，速度慢\n- pandoc 可能在输出中用了内联格式（run.bold=true），后处理要反过来\"还原\"成字符样式\n- 依赖 pandoc 二进制（版本兼容性）\n- pandoc 对一些 Markdown 方言的处理可能不符合预期\n\n**适用规模**：Phase 1 MVP 快速验证、不需要高度定制的场景\n\n### 路线 B：纯 python-docx（全控制 — PRD 推荐路线）\n\n```\nMarkdown → mistune/markdown-it → ReportModel → python-docx(渲染器+样式映射器) → DOCX\n```\n\n**渲染器核心逻辑：**\n```python\nclass DocxRenderer:\n    def __init__(self, template_path: str, style_mapping: StyleMapping):\n        self.doc = Document(template_path)  # 以模板为基础\n        self.style_mapping = style_mapping\n\n    def render_paragraph(self, block: ParagraphBlock):\n        p = self.doc.add_paragraph()\n        # 段落样式：由模板决定\n        p.style = self.doc.styles[block.type]  # Heading1, Normal, ListBullet...\n        for span in block.spans:\n            run = p.add_run(span.text)\n            # 字符样式：查 StyleMapping 表\n            char_style = self.style_mapping.get(span.format)\n            if char_style:\n                run.style = self.doc.styles[char_style]  # 关键：用样式名，不设属性\n```\n\n**关键设计点：**\n- **不在 Run 上设 bold/italic/font 属性**，统一用 `run.style = doc.styles[name]`\n- 模板的样式定义是唯一来源\n- StyleMapping 表是 Markdown 格式标记 → 模板字符样式名称的映射\n\n**优点：**\n- 一次遍历，架构简洁\n- 完全控制样式映射逻辑\n- 不依赖外部二进制\n- StyleMapping 可以动态配置（YAML）\n\n**缺点：**\n- 需要自己处理 Markdown 的所有边缘情况\n- markdown-it/mistune 的 AST 到 DOCX 的映射成本较高\n\n### 路线 C：混合（pandoc 的嘴 + python-docx 的胃）\n\n```\nMarkdown → pandoc(解析为JSON AST) → Python(AST→ReportModel) → python-docx(渲染) → DOCX\n```\n\n```bash\npandoc input.md -t json | python3 render.py --template template.docx \u003e output.docx\n```\n\n**优点：**\n- 得到 pandoc 级别的解析质量（表格、公式、脚注、交叉引用全处理）\n- 渲染部分自己控制\n- `-t json` 是 pandoc 的标准输出，格式稳定\n\n**缺点：**\n- 仍然依赖 pandoc 二进制\n- AST→ReportModel 的转换有一定复杂度\n- pandoc AST 的结构和 python-docx 的段落模型差异较大\n\n---\n\n## 三、StyleMapping 表的设计\n\n这是项目核心创新点。建议设计为 YAML 配置文件，与模板分离。\n\n```yaml\n# style-mapping.yaml\nparagraph:\n  heading1: \"Heading 1\"           # Markdown # → 模板中的 \"Heading 1\" 样式\n  heading2: \"Heading 2\"\n  heading3: \"Heading 3\"\n  paragraph: \"Normal\"             # 普通段落\n  blockquote: \"Quote\"             # 引用块\n  code_block: \"Code\"              # 代码块\n  bullet_list: \"List Bullet\"      # 无序列表\n  ordered_list: \"List Number\"     # 有序列表\n  table_header: \"Table Header\"\n  table_cell: \"Table Cell\"\n\ninline:\n  bold: \"Strong Char\"             # **粗体** → 字符样式\n  italic: \"Emphasis Char\"         # *斜体* → 字符样式\n  code: \"Code Char\"               # `行内代码` → 字符样式\n  strikethrough: \"Strikethrough Char\"\n  underline: \"Underline Char\"\n  link: \"Hyperlink Char\"\n  subscript: \"Subscript Char\"\n  superscript: \"Superscript Char\"\n\nfallback:\n  paragraph: \"Normal\"             # 找不到映射时用的默认样式\n  inline: \"Default Paragraph Font\"\n```\n\n**渲染器行为：**\n```\n输入: \"这是**粗体**和*斜体*\"\n    ↓ mistune 解析\nAST: [文本(\"这是\"), Strong(\"粗体\"), 文本(\"和\"), Emph(\"斜体\")]\n    ↓ 查 StyleMapping\n    ↓ \n输出段落: 段落样式 \"Normal\"\n  run1: 文本 \"这是\"       → 无字符样式（继承段落样式）\n  run2: 文本 \"粗体\"       → run.style = doc.styles[\"Strong Char\"]\n  run3: 文本 \"和\"         → 无字符样式\n  run4: 文本 \"斜体\"       → run.style = doc.styles[\"Emphasis Char\"]\n```\n\n**优点**：用户换模板只需改 `style-mapping.yaml`，不需要改代码。不同模板可以有不同的样式名。\n\n---\n\n## 四、CLI 友好化设计\n\n### 4.1 Unix 哲学风格\n\n```bash\n# 基本用法\nmd2docx report.md --template company-template.docx -o report.docx\n\n# 管道模式\ncat report.md | md2docx --template company-template.docx \u003e report.docx\n\n# 指定样式映射\nmd2docx report.md --template t.docx -m style-mapping.yaml -o report.docx\n\n# 验证模式（不生成，只检查模板兼容性）\nmd2docx report.md --template t.docx --validate\n\n# 列出模板中可用的样式\nmd2docx --template t.docx --list-styles\n\n# 生成默认 style-mapping.yaml（基于模板自动推断）\nmd2docx --template t.docx --init-mapping\n```\n\n### 4.2 TUI 补全友好\n\n- `--bash-completion` 输出 shell 补全脚本\n- `md2docx \u003cTab\u003e` 自动补全 `.md` 文件\n- `--template \u003cTab\u003e` 扫描 `~/.config/md2docx/templates/` 目录\n\n### 4.3 退出码和 stderr 协议\n\n```\n退出码: 0=成功, 1=解析错误, 2=模板错误, 3=映射缺失\nstderr: 纯文本状态（适合终端查看）\nstdout: 二进制 DOCX（适合管道）\n```\n\n---\n\n## 五、GUI 友好化设计\n\n### 5.1 Web UI（Phase 3 方向）\n\n```\nFastAPI + Jinja2/React 前端\n```\n\n核心页面：\n1. **上传模板**：上传 .docx，自动分析样式目录+预览\n2. **编辑映射**：下拉选择 Markdown 格式→模板样式，可视化\n3. **上传/粘贴 Markdown**：实时预览渲染效果（docx→PDF or HTML 预览）\n4. **下载**：一键下载最终 DOCX\n\n### 5.2 更轻量的 GUI 方案\n\n| 方案 | 适合场景 | 技术栈 |\n|------|---------|--------|\n| **Gradio** | 内部工具、快速原型 | Python 纯 |\n| **Textual** | 终端内 TUI（无需浏览器） | Python 纯 |\n| **Streamlit** | 数据工作者快速展示 | Python 纯 |\n| **Electron** | 独立桌面应用 | 太重，不推荐 |\n| **Typora 插件** | 如果用户用 Typora 写 MD | 与编辑器集成 |\n\n**Gradio 最快：**\n```python\nimport gradio as gr\n\ndef render(md_text, template_file):\n    with tempfile.NamedTemporaryFile() as f:\n        result = engine.render(md_text, template_file.name)\n        return result.path\n\ngr.Interface(\n    fn=render,\n    inputs=[gr.Textbox(label=\"Markdown\"), gr.File(label=\"模板 .docx\")],\n    outputs=gr.File(label=\"输出 .docx\"),\n).launch()\n```\n\n### 5.3 CLI + GUI 复用同一核心\n\n```python\n# core/engine.py — 纯逻辑，无 IO 依赖\nclass ReportEngine:\n    def render(self, md: str, template: TemplateProfile, mapping: StyleMapping) -\u003e DocxOutput: ...\n\n# cli/main.py — 终端入口\n# web/app.py — Web 入口\n# skill/skill.py — Hermes Agent 入口\n```\n\n---\n\n## 六、Hermes Agent Skill 集成\n\n### 6.1 作为终端命令技能\n\n```yaml\n# SKILL.md\nname: report-engine\ndescription: 将 Markdown 渲染为带模板样式的 DOCX 文档\ncommands:\n  - md2docx report.md -t template.docx -o output.docx\n```\n\nAgent 调用方式：\n```\n用户: \"把这份 report.md 套用公司模板生成 DOCX\"\n→ Agent 执行: md2docx report.md --template ~/templates/company.docx -o report.docx\n→ 返回文件路径给用户\n```\n\n### 6.2 作为 Agent 内部函数\n\nSkill 里提供 Python API，Agent 在 execute_code 中直接调用：\n```python\nfrom report_engine import render_docx\npath = render_docx(\"report.md\", template=\"company.docx\", mapping=\"style-mapping.yaml\")\n```\n\n---\n\n## 七、实现路线建议\n\n### Phase 1（验证概念）：路线 A（Pandoc-centric）\n\n```bash\npandoc input.md -o temp.docx --reference-doc=template.docx\npython3 -c \"\nfrom docx import Document\ndoc = Document('temp.docx')\n# 遍历所有段落，对每个 run 应用模板的字符样式\nfor p in doc.paragraphs:\n    for run in p.runs:\n        if run.bold:\n            run.bold = None  # 清除属性\n            run.style = doc.styles['Strong Char']\ndoc.save('output.docx')\n\"\n```\n\n优点：半天就能跑通完整链路，验证\"模板洗掉所有样式\"的概念。\n\n### Phase 2（完整实现）：路线 B（纯 python-docx）\n\n转向纯 python-docx 路线，原因：\n- 不依赖 pandoc 版本\n- 真正的单次遍历\n- StyleMapping 表成为一等公民\n- 可以精细控制渲染质量\n\n### Phase 3（生态）: CLI + GUI + Skill 三件套\n\n复用同一 `core/engine.py`，封装三个入口：\n- `cli/main.py` — click/argparse CLI\n- `web/app.py` — FastAPI + Gradio\n- `skill/SKILL.md` — Hermes Agent 技能描述\n\n---\n\n## 八、需要避免的坑\n\n1. **不要同时设 run.style 和 run.bold** — python-docx 会合并行为不可预测，务必二选一\n2. **模板分析器必须提取完整样式目录** — 包括 numbering definitions（列表编号）、character styles（字符样式）、table styles（表格样式）\n3. **No-template 路径不需要** — 内置一个默认模板（如 pandoc 的 reference.docx）\n4. **链接和公式可能是例外** — OpenXML 的 hyperlink 需要特殊处理，公式（OMML）不支持样式覆盖\n5. **嵌套格式**（`***粗斜体***`）— 需要定义复合映射，或者直接叠加字符样式（python-docx 不支持 run 上叠加多个字符样式，需要创建复合字符样式）\n6. **跨平台** — python-docx 在 macOS/Linux/Windows 行为一致，但字体渲染不同\n\n---\n\n## 九、参考项目\n\n| 项目 | 地址 | 借鉴点 |\n|------|------|--------|\n| **pandoc** | pandoc.org | 解析器质量和参考文档系统 |\n| **python-docx-template** | github.com/elapouya/python-docx-template | DOCX 模板的 Subdoc 机制 |\n| **mistune** | github.com/lepture/mistune | Python Markdown 解析器（速度最快） |\n| **markdown-it-py** | github.com/executablebooks/markdown-it-py | 插件化 Markdown 解析（兼容 JS 生态） |\n| **WeasyPrint** | weasyprint.org | HTML→PDF 的样式继承模型值得借鉴 |\n| **Typst** | typst.app | 新一代排版系统，可以作为长期对标 |\n"])</script><script>self.__next_f.push([1,"17:T144a,"])</script><script>self.__next_f.push([1,"\n# macOS 内置大模型与本地 AI 训练\n\n\u003e 关键词：apfel、Apple Intelligence、FoundationModels、MLX、本地微调、蒸馏\n\u003e 最后更新：2026-06-10\n\n---\n\n## 一、macOS 内置大模型\n\n从 macOS 26 Tahoe 开始，每台 Apple Silicon Mac **都自带一个 LLM**，约 **3B 参数**，4096 token 上下文，混合 2/4-bit 量化，运行在 Neural Engine 上。\n\n### 基础信息\n\n| 项目 | 值 |\n|------|-----|\n| 参数规模 | ~3B |\n| 上下文窗口 | 4096 tokens |\n| 精度 | 混合 2/4-bit 量化 |\n| 运行位置 | Neural Engine + GPU |\n| 语言 | en, de, es, fr, it, ja, ko, pt, zh |\n| 底层框架 | FoundationModels.framework（Swift API） |\n| 隐私 | 不上传云端，Apple 不用于训练 |\n\n---\n\n## 二、apfel——内置模型的 CLI/HTTP 包装\n\n**apfel** 是 GitHub 上的开源项目（Arthur-Ficial/apfel），把 Apple 的 FoundationModels 框架包装成了 CLI 和 HTTP 服务器。\n\n### 安装\n\n```bash\nbrew install apfel\n```\n\n### CLI 用法\n\n```bash\n# 直接问\napfel \"什么是注意力机制？\"\n\n# 管道\ncat 财报.txt | apfel \"总结这段\"\n\n# 交互式聊天\napfel --chat\n\n# 带 system prompt\napfel --chat -s \"你是一个金融分析师\"\n```\n\n### HTTP 服务器（OpenAI 兼容）\n\n```bash\napfel server --port 8080\n```\n\n启动后提供一个 OpenAI 兼容的 API：\n\n```bash\ncurl http://localhost:8080/v1/chat/completions \\\n  -H \"Content-Type: application/json\" \\\n  -d '{\n    \"model\": \"apple-intelligence\",\n    \"messages\": [{\"role\": \"user\", \"content\": \"你好\"}]\n  }'\n```\n\n### 优点\n- 零配置，不需要下载模型、不需要 API key\n- 完全本地运行，不联网\n- OpenAI 兼容接口，可直接替换代码中的 GPT-4\n- 免费无限量使用\n\n### 局限\n\n| 局限 | 说明 |\n|------|------|\n| 模型不可选 | 只能用 Apple 内置的 ~3B 模型 |\n| 不可微调 | apfel 只做推理包装，不支持 LoRA 微调 |\n| 上下文小 | 4096 tokens，长文档需要分片 |\n| 能力有限 | 3B 模型 + 强量化，能力远不如 GPT-4/Qwen3 |\n| 只跑在 Mac 上 | 不能部署到服务器 |\n\n---\n\n## 三、能不能用来练习蒸馏和微调？\n\n### 蒸馏——✅ 可以\n\napfel 的 HTTP API 可以当 **Teacher 模型**：\n\n```\n流程：\n1. 用 apfel 的 API 批量生成问答数据\n2. 用这些数据训练一个小模型（Student）——用 MLX 或 Unsloth\n3. 对比 Student 和 Teacher 的输出差异\n\n这就是蒸馏的标准做法。\n```\n\n**具体操作**：\n\n```python\nimport requests\n\n# 用内置模型生成训练数据\nresp = requests.post(\"http://localhost:8080/v1/chat/completions\", json={\n    \"model\": \"apple-intelligence\",\n    \"messages\": [{\"role\": \"user\", \"content\": \"请解释什么是RAG？\"}]\n})\nteacher_answer = resp.json()[\"choices\"][0][\"message\"][\"content\"]\n\n# 然后用 teacher_answer 作为训练数据，训练小模型\n```\n\n### 微调——❌ 不能直接微调内置模型\n\nApple 的内置模型本身 **不能** 通过 apfel 微调。但是：\n\n| 方案 | 能做什么 | 难度 |\n|------|---------|------|\n| **MLX + mlx-tune** | 在 Mac 上用 MLX 框架微调开源模型（Qwen/LLaMA），利用 GPU/ANE | ★★★ |\n| **Unsloth** | Mac MPS 后端，LoRA 微调 | ★★ |\n| **pmetal** | Rust 写的 Metal 高性能微调框架 | ★★★★ |\n| **LoRA-MPS-FineTuning** | GitHub 上专门针对 Apple Silicon 的微调项目 | ★★ |\n\n**最佳实践**：\n\n```bash\n# 1. 用 MLX 微调 Qwen3-0.6B（你 Mac 跑得动）\npip install mlx-lm\n\n# 2. 准备数据（JSONL 格式）\n# {\"messages\": [{\"role\": \"user\", \"content\": \"...\"}, {\"role\": \"assistant\", \"content\": \"...\"}]}\n\n# 3. LoRA 微调\nmlx_lm.lora --model Qwen/Qwen3-0.6B \\\n  --data ./train_data.jsonl \\\n  --lora-layers 8 \\\n  --batch-size 1 \\\n  --iters 200\n\n# 4. 合并 + 推理\nmlx_lm.fuse --model Qwen/Qwen3-0.6B --adapter-path ./adapters\n```\n\n### 蒸馏 + 微调完整练习方案\n\n**这是你在 Mac 上就能完成的标准实验**：\n\n```\nStep 1: 用 apfel（Teacher）批量生成 500 条 QA 数据\n         apfel server → 你的 Python 脚本调 API → 存 JSONL\n\nStep 2: 用 MLX 微调一个开源小模型（Student）\n         mlx_lm.lora --model Qwen3-0.6B --data ./data.jsonl\n\nStep 3: 对比 Teacher vs Student\n         同样的问题，分别问 apfel 和你的微调模型\n         评估回答质量、推理速度、模型大小\n```\n\n---\n\n## 四、Apple Silicon 本地训练工具对比\n\n| 工具 | 支持训练？ | 支持推理？ | 语言 | 难度 |\n|------|-----------|-----------|------|------|\n| **apfel** | ❌ | ✅（内置模型） | Swift/CLI | ★ |\n| **MLX** | ✅ | ✅ | Python | ★★★ |\n| **mlx-tune** | ✅ | ✅ | Python/CLI | ★★ |\n| **Unsloth** | ✅（MPS） | ✅ | Python | ★★ |\n| **pmetal** | ✅ | ✅ | Rust | ★★★★ |\n| **llama.cpp** | ❌ | ✅（Metal） | C++/CLI | ★★ |\n| **Ollama** | ❌ | ✅ | CLI | ★ |\n| **LM Studio** | ❌ | ✅ | GUI | ★ |\n\n### 推荐学习路径\n\n```\n入门：Ollama + apfel（只推理，不训练）\n  ↓\n进阶：MLX + mlx-tune（在 Mac 上微调小模型）\n  ↓\n高阶：apfel server 当 Teacher → MLX 训练 Student（完整蒸馏实验）\n  ↓\n实战：用蒸馏后的模型替换你 RAG 系统中的 LLM，对比效果\n```\n"])</script><script>self.__next_f.push([1,"18:T119b,"])</script><script>self.__next_f.push([1,"\n# 如何从开源项目中学习：以 OpenViking 为例\n\n\u003e 2026 年，代码本身越来越不值钱，值钱的是设计决策背后的 tradeoff 意识。\n\u003e AI 能解释每一行代码在干什么，但不能替你做出架构选择。\n\u003e 学习的核心目标：从\"看懂代码\"变成\"看懂为什么这样设计\"。\n\n## 三层递进法\n\n### 第一层：读文档 \u003e 读代码（30 分钟）\n\n不要急着翻代码。先读：\n\n1. **README 的问题陈述** — 项目解决了什么痛点？你是否有同感？\n2. **Architecture Overview** — 全局架构图，理解模块划分哲学\n3. **核心设计文档** — storage architecture、data flow 等\n\n**例：OpenViking（github.com/volcengine/OpenViking，25.4k stars）**\n\n问题：AI Agent 开发的四个痛点：\n- Fragmented Context（记忆/资源/技能散落各处）\n- Surging Context Demand（长期任务上下文膨胀）\n- Poor Retrieval Effectiveness（平面存储缺乏全局视角）\n- Unobserveable Context（传统 RAG 检索链是黑盒）\n\n架构三层：\n```\nClient → Service Layer (FSService/SearchService/SessionService…7个)\n              ↓\n    ┌─────────┼─────────┐\n    ↓         ↓         ↓\nRetrieve   Session   Parse\n              ↓\n         Compressor\n              ↓\n    Storage Layer (AGFS + Vector Index)\n```\n\n7 个 Service 的划分本身就是一种架构范本。\n\n**2026 新工具：DeepWiki（deepwiki.com）** — 自动索引整个代码库、交叉引用、文件关系图。比自己翻 GitHub 树快 10 倍。\n\n### 第二层：选一条主线，端到端追（2 小时）\n\n不要试图理解所有代码。选**一条完整的数据流**追到底。\n\n**例：OpenViking 的 \"添加上下文\" 流程**\n\n```\nInput → Parser → TreeBuilder → AGFS → SemanticQueue → Vector Index\n```\n\n操作：\n```bash\n# 找到入口\ngrep -r \"class Parser\" --include=\"*.py\" src/\n# 看 imports 理解依赖\n# 看测试\nfind tests -name \"*parser*\"\n# 看文件演化史\ngit log --all --follow -p src/parser/parser.py\n```\n\n**测试比注释更有价值。** 测试用例暴露模块的契约和边界条件。\n\n### 第三层：理解架构模式的为什么（最值钱的一层）\n\nAI 很难完成这一层。要自己追问。\n\n**Q：为什么 OpenViking 用 \"文件系统范式\" 而不是 flat chunk 存储？**\n\n因为 URI 的本质是层次结构：`viking://resources/docs/auth`。文件系统的目录、层级、导航，直接映射到上下文管理的概念模型。这不是技术选择，是**概念模型的选择**。\n\n**Q：为什么 AGFS 从 Python 重写成了 Rust（RAGFS）？**\n\n看 crates/ragfs/ 目录。性能关键路径从动态语言迁移到零开销抽象语言，这是经典架构演化模式。\n\n**Q：为什么 L0/L1/L2 三级上下文？**\n\nL0 = 摘要抽象，L1 = 概览，L2 = 全文。Progressive loading 模式——先给 Agent 轻量级摘要，按需展开。token 节省 + 检索效率的经典 tradeoff。\n\n---\n\n## 2026 工具箱\n\n| 工具 | 用途 |\n|------|------|\n| **DeepWiki** | 代码库级索引、交叉引用 |\n| **git log --all --follow** | 理解文件演化历史 |\n| **git blame + GitHub PR** | 看某行代码的上下文和设计讨论 |\n| **AI assistant** | 问具体问题：\"AGFS 的 write path 是什么样的？\" |\n| **build + run tests** | 验证理解的正确性 |\n\n---\n\n## 常见误区\n\n1. ❌ 从 main.py 开始读 → ✅ 从架构文档开始\n2. ❌ 逐行精读 → ✅ 先扫目录结构，选一条流程追\n3. ❌ 只看代码不看 Issues/PR → ✅ PR 中有大量设计讨论\n4. ❌ 被动阅读 → ✅ fork 下来改一行代码看测试会不会挂\n\n---\n\n## 从 OpenViking 可以带走的设计模式\n\n1. **Context as Filesystem** — 上下文不只是向量，而是可导航的目录树\n2. **Dual-layer Storage** — 内容层和索引层分离，各自优化\n3. **L0/L1/L2 Progressive Loading** — 按需加载，不要把所有内容塞进 context\n4. **Service 分解方式** — 7 个 Service 的划分就是架构范本\n\n核心原则：**读开源项目不是为了复制代码，而是为了让那个项目的设计直觉变成你的直觉。**\n\n---\n\n## 延伸阅读\n\n- [OpenViking GitHub](https://github.com/volcengine/OpenViking)\n- [OpenViking 架构文档](https://docs.openviking.ai/en/concepts/01-architecture)\n- [OpenViking Storage Architecture](https://docs.openviking.ai/en/concepts/05-storage)\n- [DeepWiki: OpenViking](https://deepwiki.com/volcengine/OpenViking)\n"])</script><script>self.__next_f.push([1,"0:{\"P\":null,\"c\":[\"\",\"blogs\"],\"q\":\"\",\"i\":false,\"f\":[[[\"\",{\"children\":[\"blogs\",{\"children\":[\"__PAGE__\",{}]}]},\"$undefined\",\"$undefined\",16],[[\"$\",\"$1\",\"c\",{\"children\":[[[\"$\",\"link\",\"0\",{\"rel\":\"stylesheet\",\"href\":\"/_next/static/chunks/233p45nuh4m5b.css\",\"precedence\":\"next\",\"crossOrigin\":\"$undefined\",\"nonce\":\"$undefined\"}],[\"$\",\"link\",\"1\",{\"rel\":\"stylesheet\",\"href\":\"/_next/static/chunks/3mi_koyhkiqud.css\",\"precedence\":\"next\",\"crossOrigin\":\"$undefined\",\"nonce\":\"$undefined\"}],[\"$\",\"link\",\"2\",{\"rel\":\"stylesheet\",\"href\":\"/_next/static/chunks/17und6-ksznhx.css\",\"precedence\":\"next\",\"crossOrigin\":\"$undefined\",\"nonce\":\"$undefined\"}],[\"$\",\"script\",\"script-0\",{\"src\":\"/_next/static/chunks/1xh5_hh-4xv03.js\",\"async\":true,\"nonce\":\"$undefined\"}],[\"$\",\"script\",\"script-1\",{\"src\":\"/_next/static/chunks/18071siihbhhu.js\",\"async\":true,\"nonce\":\"$undefined\"}]],[\"$\",\"html\",null,{\"lang\":\"zh\",\"suppressHydrationWarning\":true,\"children\":[\"$\",\"body\",null,{\"className\":\"geist_a71539c9-module__T19VSG__variable geist_mono_8d43a2aa-module__8Li5zG__variable no ompiler: translate the code from source language to target language.\",\"content\":\"\\n### Introduction\\n\\n##### language processor\\n\\n- compiler: translate the code from source language to target language.\\n- interpreter: Perform operations in the source language directly from the input\\n- **example**: java processor:\\n  source language -\u003e translator -\u003e middle program -\u003e virtual machine\\n                                                                                  input /                              \\\\ output\\n- a language process system:\\n  source language -\u003e pre-processor -\u003e pre-processed program  -\u003e compiler -\u003e target assembler -\u003e assembler -\u003e relocatable machine code -\u003e linker(resolves external memory addresses)\u0026loader(execute all executable target files in memory) \u003c- library files \u0026 relocatable files,     and finally generate target machine code from linker and loader.\"},{\"slug\":\"linux_learning\",\"title\":\"Linux Learning\",\"date\":\"2026-06-25T00:00:00.000Z\",\"tags\":[\"linux\",\"learning\"],\"category\":\"tech\",\"description\":\"1. - **WSL Features ** :\",\"content\":\"\\n1. - **WSL Features ** :\\n\\n     -WSL creates a `/home/\u003cusername\u003e` directory by default, and the user is usually set as the owner of this directory. This means that within the `/home/\u003cusername\u003e` directory and its subdirectories, you can create files and directories freely.\\n\\n     - If you are trying to create files or directories in other locations, such as'/' root or other non-personal directories, then 'sudo' permissions may be required.\\n\\n     and usually, `~` refer to the dir `/home/\u003cusername\u003e`, they are the same. you can also see `/home/others`, but `~` always be your home, execute `pwd` to see.\\n\\n     use `su - \u003cusername\u003e` to change user.\"},{\"slug\":\"linux_shell\",\"title\":\"Linux Shell\",\"date\":\"2026-06-25T00:00:00.000Z\",\"tags\":[\"linux\",\"shell\"],\"category\":\"tech\",\"description\":\"***[2.shell工具和脚本_哔哩哔哩_bilibili](https://www.bilibili.com/video/BV1XN4y187zp/?p=3\u0026vd_source=8a614553fd42ac4044499e810a816...\",\"content\":\"$d\"},{\"slug\":\"make_learning\",\"title\":\"...other commands\",\"date\":\"2026-06-25T00:00:00.000Z\",\"tags\":[\"make\",\"learning\"],\"category\":\"devops\",\"description\":\"for C/C++, u define commands in ``Makefile``, like ``Dockerfile``\",\"content\":\"$e\"},{\"slug\":\"react_next\",\"title\":\"server side rendering(SSR) and client side rendering(CSR)\",\"date\":\"2026-06-25T00:00:00.000Z\",\"tags\":[\"react\"],\"category\":\"frontend\",\"description\":\"feature of next.js, by 'use client' at the top of a file\",\"content\":\"\\n#### server side rendering(SSR) and client side rendering(CSR)\\n\\nfeature of next.js, by 'use client' at the top of a file\\n\\nSSR: the content of website will be rendered on server side and send the processed html files to client side, which can users have a faster experience.\\n\\nCSR: the content of website will not pre-render on server side,  instead, an html file with some js files will be sent to client side and rendered by browser, thus users can feel a little slow.\\n\\n\"},{\"slug\":\"relative_path_notice\",\"title\":\"The relative path is relative to the compiled directory of the instruction, not relative to the file itself\",\"date\":\"2026-06-25T00:00:00.000Z\",\"tags\":[\"tech\"],\"category\":\"tech\",\"description\":\"current_path = os.getcwd()\",\"content\":\"\\n### The relative path is relative to the compiled directory of the instruction, not relative to the file itself\\n\\nfor example:\\n\\n```\\ndir\\n\\t|\\n\\t+ dir1\\n\\t\\t|\\n\\t\\t+ relative.py\\n```\\n\\nand in relative.py\\n\\n```python\\nimport os \\n\\ncurrent_path = os.getcwd()\\n\\nprint(current_path)\\n```\\n\\nexecute relative.py, the output will be:\\n\\n```bash\\nE:\\\\dir\\n```\\n\\nand this is your working directory:\\n\\n![relative_path](./picture/relative_path.png)\\n\\n\"},{\"slug\":\"use_rawlink_for_downloading_files\",\"title\":\"Use Rawlink For Downloading Files\",\"date\":\"2026-06-25T00:00:00.000Z\",\"tags\":[\"tech\"],\"category\":\"tech\",\"description\":\"download files via markdown is not allowed on github, but u can:\",\"content\":\"\\ndownload files via markdown is not allowed on github, but u can:\\n\\n```markdown\\n[Download .zip file](https://raw.githubusercontent.com/your-username/your-repo/main/yourfile.zip)\\n```\\n\\n\"},{\"slug\":\"大四课程提前修计划\",\"title\":\"大二下or大三下：\",\"date\":\"2026-06-25T00:00:00.000Z\",\"tags\":[\"tech\"],\"category\":\"life\",\"description\":\"\",\"content\":\"\\n# 大二下or大三下：\\n\\n应用软件综合课程设计I\\n\\n区块链技术及应用\\n\\n区块链技术及应用实验\\n\\n\\n\\n# 大三上\\n\\n应用软件综合课程设计II\\n\\n数据挖掘\\n\\n大数据可视化\"},{\"slug\":\"小说\",\"title\":\"野狗\",\"date\":\"2026-06-25T00:00:00.000Z\",\"tags\":[\"tech\"],\"category\":\"life\",\"description\":\"​\\t说实话写点什么一直是我的理想，偶尔它会被忘记，但是每次重新想起我都会在电脑新建文件夹看看有没有想法，这是否也算得上热爱呢？\",\"content\":\"\\n# 野狗 \\n\\n\\n\\n\\n\\n不要一直往回看，衣服反着穿可是勒脖子的。\\n\\n\\n\\n\\n\\n### 前言\\n\\n​\\t说实话写点什么一直是我的理想，偶尔它会被忘记，但是每次重新想起我都会在电脑新建文件夹看看有没有想法，这是否也算得上热爱呢？\\n\\n​\\t但是说实话，我个人无论见识还是格局都甚是局促，阅历很有限，与大作家丝毫没有可比性，有可能只是单纯地输出个人的情绪或者观点，并且还通常不怎么好，并且我也深受互联网幸存者偏差的影响，很难写出真能反映社会现状的文字。\\n\\n​\\t但是文人骚客写文字也是排忧解闷，我也想试试。\\n\\n\\n\\n### 正文\\n\\n​\\t王卓乐想都没想就把家里的照片全删掉了，八张照片，都是家里熟悉的场景，几十MB，不如腾出来留给其他的文件。\\n\\n​\\t”如果照片里有家人或者有我们的合照我是不是就会好好端详一阵子？“\\n\\n​\\t他发现他又对着这些照片发了好一会呆，不过以后不会这样了，他感到后悔，发呆这段时间又要被很多人超越了，他甚至可以知道哪几个已经趁机超过他了，有几个已经赶上来了。那些人死命奔跑踢起的尘风堵得他的鼻子有些喘不过气。\\n\\n​\\t“算了，其实我也一样不会看的吧。”\"},{\"slug\":\"Subagent-Skill优化方法论\",\"title\":\"Subagent 化 Skill 优化方法论\",\"date\":\"2026-06-24T00:00:00.000Z\",\"tags\":[\"ai-agents\",\"llm\"],\"category\":\"ai\",\"description\":\"当 Skill 的步骤链变长时，单 Agent 架构会遇到一个根本性问题：**上下文污染（context pollution）**。\",\"content\":\"$f\"},{\"slug\":\"TechBlogHunter-1849\",\"title\":\"Techbloghunter 1849\",\"date\":\"2026-06-24T00:00:00.000Z\",\"tags\":[\"tech-news\",\"curated\"],\"category\":\"tech\",\"description\":\"📄 **[Migrating Data Ingestion Systems at Meta Scale](https://engineering.fb.com/2026/05/12/data-infrastructure/migrating...\",\"content\":\"$10\"},{\"slug\":\"vLLM-Prefix-Caching原理与LMCache调研\",\"title\":\"vLLM Prefix Caching (`--enable-prefix-caching`) 原理与 LMCache 调研报告\",\"date\":\"2026-06-16T00:00:00.000Z\",\"tags\":[\"llm\",\"deployment\",\"vllm\"],\"category\":\"ai\",\"description\":\"把整个 prompt（system prompt + user query）一次性并行算完，生成每个 token 位置对应的 **K 矩阵** 和 **V 矩阵**。计算量 = prompt token 数 × 模型参数量。prompt 越...\",\"content\":\"$11\"},{\"slug\":\"DeepSeek-V4-Flash内网vLLM部署指南\",\"title\":\"DeepSeek-V4-Flash 内网 vLLM 部署完全指南\",\"date\":\"2026-06-15T00:00:00.000Z\",\"tags\":[\"llm\",\"deployment\",\"vllm\"],\"category\":\"ai\",\"description\":\"DeepSeek-V4-Flash 是你从 ModelScope 下载的模型，核心参数：\",\"content\":\"$12\"},{\"slug\":\"ModelScope模型本地编译部署完全指南\",\"title\":\"ModelScope 权重分片 → 内网 vLLM 部署完整流程\",\"date\":\"2026-06-15T00:00:00.000Z\",\"tags\":[\"llm\",\"deployment\",\"modelscope\"],\"category\":\"ai\",\"description\":\"从 ModelScope 下载的权重分片，到最后能在内网用 vLLM 提供服务，中间需要经过的环节：\",\"content\":\"$13\"},{\"slug\":\"智能体开发基础与模型量化指南\",\"title\":\"智能体开发基础知识与模型量化指南\",\"date\":\"2026-06-13T00:00:00.000Z\",\"tags\":[\"ai-agents\",\"llm\"],\"category\":\"ai\",\"description\":\"默认模型权重用 BF16/FP16（每个参数 2 字节）。70B 模型 BF16 需要 **140GB 显存**。量化降低精度来压缩体积：\",\"content\":\"$14\"},{\"slug\":\"消融实验-Ablation-Study\",\"title\":\"消融实验 (Ablation Study)\",\"date\":\"2026-06-13T00:00:00.000Z\",\"tags\":[\"deep-learning\",\"ml-theory\"],\"category\":\"ai\",\"description\":\"控制变量法——把模型或系统的某个组件切除掉，观察性能下降了多少\",\"content\":\"\\n# 消融实验 (Ablation Study)\\n\\n## 是什么\\n\\n控制变量法——把模型/系统的某个组件\\\"切除\\\"掉，观察性能下降了多少，从而判断该组件的贡献度。\\n\\n名字来源于脑科学：医生切除部分脑区，观察哪些功能丧失，推断该区域的作用。\\n\\n## 基本原理\\n\\n```\\n完整系统 → 性能 95%\\n去掉组件 A → 性能 80%  → A 贡献了 15%\\n去掉组件 B → 性能 93%  → B 贡献了 2%（可有可无）\\n同时去掉 A+B → 性能 70% → A 和 B 有 5% 的交互增益\\n```\\n\\n核心逻辑：不依赖直觉，用实验数据证明每个模块是否真的有用。\\n\\n## 什么时候需要做\\n\\n### 1. 论文 / 学术汇报\\n审稿人几乎必问：\\\"你怎么证明你加的每个模块都有用？\\\"\\n消融实验是 ML 论文的标准配置，否则 reviewer 会说\\\"没有消融 = 没有说服力\\\"。\\n\\n### 2. 迭代新特性 / 新模块时\\n比如给 RAG 系统加了 reranker + query rewrite，跑一次消融：\\n- 去掉 reranker → 指标降了 → 保留\\n- 去掉 query rewrite → 指标没变 → 删掉，少维护一个坑\\n\\n### 3. 模型压缩 / 剪枝时\\n移除注意力头、剪掉某些层，看哪些是冗余的，哪些不能动。\\n\\n### 4. 调试奇怪的现象时\\n\\\"加了 A 效果反而变差了？\\\" → 单独测 A 的贡献，可能是 A 和已有模块冲突。\\n\\n## 一个典型例子\\n\\n做摘要生成系统，三个组件：\\n- 实体链接（+3% ROUGE）\\n- 关键词提取（+0.5% ROUGE，可以砍掉）\\n- 重排序（-1% ROUGE，这个模块负优化）\\n\\n没有消融，你可能会把所有组件都堆上去，系统变慢变复杂，效果反而没提升。\\n\\n## 关联概念\\n\\n- A/B 测试（消融是在固定模型上切组件，A/B 是比较两个不同版本）\\n- 敏感性分析（消融看组件的贡献度，敏感性看参数变化的影响）\\n\"},{\"slug\":\"AgentSkill设计-Llm驱动转换\",\"title\":\"Agent Skill 设计方案：LLM 驱动的 Markdown→DOCX 转换\",\"date\":\"2026-06-10T00:00:00.000Z\",\"tags\":[\"ai-agents\",\"llm\"],\"category\":\"tech\",\"description\":\"给大模型造一套手艺工具——将 Markdown 套入 DOCX 模板\",\"content\":\"$15\"},{\"slug\":\"Markdown套Docx模板实现方案\",\"title\":\"将 Markdown 套入 DOCX 模板的实现方案调研\",\"date\":\"2026-06-10T00:00:00.000Z\",\"tags\":[\"tools\",\"productivity\"],\"category\":\"tech\",\"description\":\"\u003e 背景：报告生成引擎项目需要将 Markdown 内容渲染为 DOCX，要求模板是**唯一样式权威**（template washes all styles），内容中的格式标记（粗体/斜体/代码）通过 StyleMapping 表映射为模...\",\"content\":\"$16\"},{\"slug\":\"macOS内置大模型与本地训练\",\"title\":\"macOS 内置大模型与本地 AI 训练\",\"date\":\"2026-06-10T00:00:00.000Z\",\"tags\":[\"llm\",\"macos\",\"local-training\"],\"category\":\"ai\",\"description\":\"\u003e 关键词：apfel、Apple Intelligence、FoundationModels、MLX、本地微调、蒸馏\",\"content\":\"$17\"},{\"slug\":\"如何从开源项目中学习\",\"title\":\"如何从开源项目中学习：以 OpenViking 为例\",\"date\":\"2026-06-10T00:00:00.000Z\",\"tags\":[\"open-source\",\"learning\"],\"category\":\"ai\",\"description\":\"\u003e 2026 年，代码本身越来越不值钱，值钱的是设计决策背后的 tradeoff 意识。\",\"content\":\"$18\"}],\"tags\":[\"ai-agents\",\"cmake\",\"curated\",\"deep-learning\",\"deployment\",\"docker\",\"learning\",\"linux\",\"llm\",\"local-training\",\"macos\",\"make\",\"ml-theory\",\"modelscope\",\"open-source\",\"productivity\",\"react\",\"regex\",\"shell\",\"tech\",\"tech-news\",\"tools\",\"vllm\"]}
